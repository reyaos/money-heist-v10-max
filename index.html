// Dead zone removed — trades allowed 24/7 on all instruments
let _currentInst="XAUUSD";
const inDead = h=>false;
const inAsian= h=>h>=0&&h<8;
const nowGMT = ()=>{const d=new Date();return d.getUTCHours()+(d.getUTCMinutes()/60)+(d.getUTCSeconds()/3600);};
const fmtDur = s=>{if(!s)return"0s";const m=Math.floor(s/60),sec=s%60;return m?`${m}m ${sec}s`:`${sec}s`;};
const fmtTime= ()=>new Date().toLocaleTimeString();
const fmtDateShort=ts=>new Date(ts).toLocaleDateString("en-US",{month:"short",day:"numeric",year:"2-digit"});

// ══════════════════════════════════════════════════════════════════
//  HFT CAPITAL PROTECTION CONSTANTS — Exness Zero / XAUUSD / 1:2000
//  Widened thresholds give trades room to breathe through normal
//  XAU volatility without neutering lot sizes after 2-3 losses.
// ══════════════════════════════════════════════════════════════════
const DAILY_STOP_PCT   = 0.20;  // stop trading if balance drops 20% from day start (was 15%)
const CAUTION_PCT      = 0.08;  // reduce lots if balance drops 8% from day start (was 5%)

// ── EXNESS ZERO ACCOUNT CONSTANTS ─────────────────────────────────
const EXNESS_COMMISSION_PER_LOT_RT = 9.0; // ~$9 round-trip per full lot (open+close)
const EXNESS_LEVERAGE              = 2000; // 1:2000
const EXNESS_MARGIN_SAFETY         = 0.40; // never use >40% of free equity as margin

// ── SESSION VOLATILITY MULTIPLIERS FOR SL (XAU-specific) ──────────
function getSessionSLMult(hourGMT){
  if(hourGMT>=13 &&hourGMT<17 )return 1.35; // London/NY overlap (was 2.0, most volatile but not extreme)
  if(hourGMT>=8  &&hourGMT<10 )return 1.20; // London open spike (was 1.8)
  if(hourGMT>=13 &&hourGMT<15 )return 1.20; // NY open (was 1.6)
  if(hourGMT>=0  &&hourGMT<8  )return 0.85; // Asian — quiet
  return 1.0;
}

// ── SWING STRUCTURE FINDER — finds last significant swing for SL ───
// Returns the price of the last swing low (BUY) or swing high (SELL)
// that represents real market structure, not just noise
function findStructureSL(cs, dir, atr){
  if(!cs||cs.length<10)return null;
  const lookback=Math.min(cs.length-1, 30); // look back up to 30 candles
  const slice=cs.slice(-lookback);

  if(dir==="BUY"){
    // Find the lowest swing low — a candle whose low is lower than both neighbours
    let swingLow=Infinity;
    for(let i=1;i<slice.length-1;i++){
      const c=slice[i];
      if(c.low<slice[i-1].low&&c.low<slice[i+1].low){
        // Valid swing low — but must be below current price (meaningful)
        if(c.low<slice[slice.length-1].close){
          swingLow=Math.min(swingLow,c.low);
        }
      }
    }
    // Fallback: use the lowest low of last 10 candles
    if(swingLow===Infinity){
      swingLow=Math.min(...slice.slice(-10).map(c=>c.low));
    }
    return swingLow;
  }else{
    // Find the highest swing high
    let swingHigh=-Infinity;
    for(let i=1;i<slice.length-1;i++){
      const c=slice[i];
      if(c.high>slice[i-1].high&&c.high>slice[i+1].high){
        if(c.high>slice[slice.length-1].close){
          swingHigh=Math.max(swingHigh,c.high);
        }
      }
    }
    if(swingHigh===-Infinity){
      swingHigh=Math.max(...slice.slice(-10).map(c=>c.high));
    }
    return swingHigh;
  }
}

// ══════════════════════════════════════════════════════════════════
//  MASTER HFT SL CALCULATOR — EXNESS ZERO / XAUUSD / 1:2000
//  Layer 1: Real market structure (swing low/high)
//  Layer 2: Liquidity sweep buffer (0.3× ATR beyond structure)
//  Layer 3: Spread buffer (2× spread — zero on Exness Zero, spikes on news)
//  Layer 4: Session volatility multiplier
//  Layer 5: Hard minimum floor $1.50 (3× Exness Zero max spread spike)
//  Layer 6: Hard maximum cap (never risk more than 15% of balance)
// ══════════════════════════════════════════════════════════════════
function calcHFTSL({cs, dir, entry, atr, spread, hourGMT, balance, inst="XAUUSD"}){
  // XAU/USD only
  const Layer1=findStructureSL(cs, dir, atr);
  const sweepBuffer=atr*0.30;
  const spreadBuffer=spread*2.0;

  let rawSL;
  if(Layer1!==null){
    if(dir==="BUY"){
      rawSL=Math.abs(entry-(Layer1-sweepBuffer-spreadBuffer));
    }else{
      rawSL=Math.abs((Layer1+sweepBuffer+spreadBuffer)-entry);
    }
  }else{
    rawSL=1.2*atr+spreadBuffer;
  }

  const sessMult=getSessionSLMult(hourGMT||0);
  rawSL=rawSL*sessMult;

  const minATRCover=atr*1.0;
  rawSL=Math.max(rawSL, minATRCover);

  // Layer 5: Hard minimum floor — $1.50 for Exness Zero XAUUSD
  // Rationale: Exness Zero spread spikes to $0.30-$0.50 during news;
  // $1.50 floor ensures SL sits beyond 3× max spike, not inside it.
  rawSL=Math.max(rawSL, 1.50); // was 0.80

  const pip=10;
  // Layer 6: Hard max — never risk more than 15% of START balance per trade (absolute cap)
  // Uses balance param which is overridden with real balance at entry call site
  const maxRiskPerTrade=balance*0.15; // was 0.10 — absolute ceiling anchored to start balance
  const maxSLAtMinLot=maxRiskPerTrade/(MIN_LOT*pip);
  rawSL=Math.min(rawSL, maxSLAtMinLot);

  const slPrice=dir==="BUY"
    ?+(entry-rawSL).toFixed(2)
    :+(entry+rawSL).toFixed(2);

  return{sl:slPrice, slD:+rawSL.toFixed(2)};
}

// ══════════════════════════════════════════════════════════════════
//  INSTRUMENT-AWARE LOT SIZING — EXNESS ZERO ACCOUNT
//  Broker : Exness Zero | Instrument : XAU/USD | Leverage : 1:2000
//  Commission : ~$9 round-trip per full lot (open + close)
//  Contract  : 100 troy oz | Pip value : $10/pip/lot | Min lot : 0.01
//
//  PHASE-BASED RISK MODEL (replaces flat vote tiers):
//   Phase 1 — Build    (balance < 2× startBal)  : risk 4–6%
//   Phase 2 — Compound (balance 2×–6× startBal) : risk 5–8%
//   Phase 3 — Secure   (balance ≥ 6× startBal)  : risk 2–3%
//
//  Additional layers:
//   • Commission guard  — TP must clear round-trip cost before it's valid
//   • Margin guard      — open margin never exceeds 40% of free equity
//   • Absolute max cap  — never risk more than 15% of SESSION START balance
//   • Hot streak mult   — 3+ consecutive wins → lots × 1.20 (momentum)
//   • Recovery mode     — 3+ consecutive losses → require high-conviction only
//   • HMR windows       — 50% lot reduction during Exness high-margin periods
//
//  Hard limits: min 0.01, max 5.0 lots
// ══════════════════════════════════════════════════════════════════
function calcHFTLots({balance, dayStartBal, strength, slD, score, inst="XAUUSD",
                      startBalance, streak, livePrice, hourGMT}){
  const pip=10; // $10 per pip per 1.0 lot on XAU/USD

  // ── DRAWDOWN ZONES (widened for Exness Zero breathing room) ───────
  const drawdownPct=(dayStartBal-balance)/Math.max(dayStartBal,0.01);
  const inCaution = drawdownPct>=CAUTION_PCT && drawdownPct<DAILY_STOP_PCT; // 8–20%
  const inDanger  = drawdownPct>=DAILY_STOP_PCT*0.80; // ≥16% — danger threshold

  // ── VOTE COUNT ────────────────────────────────────────────────────
  const votes=score||Math.round((strength/100)*MAX_SCORE);

  // ── PHASE DETECTION — based on progress toward profit target ──────
  const sessionStart = startBalance || dayStartBal; // anchor to session start balance
  const growthRatio  = balance / Math.max(sessionStart, 0.01);
  let phase;
  if(growthRatio < 2.0)       phase = 1; // Build    ($50 → $100)
  else if(growthRatio < 6.0)  phase = 2; // Compound ($100 → $300+)
  else                        phase = 3; // Secure   ($300+ — protect gains)

  // ── BASE RISK % BY VOTE TIER ──────────────────────────────────────
  let riskPct;
  if(phase===3){
    // Secure phase — de-risk, let compounded gains coast home
    riskPct = votes>=6 ? 0.030 : votes>=5 ? 0.025 : 0.020;
  } else if(phase===2){
    // Compound phase — this is where the $50→$550 math accelerates
    riskPct = votes>=6 ? 0.080 : votes>=5 ? 0.070 : votes>=4 ? 0.060 : 0.050;
  } else {
    // Build phase — strong enough to compound, tight enough to survive
    riskPct = votes>=6 ? 0.060 : votes>=5 ? 0.055 : votes>=4 ? 0.050 : 0.040;
  }

  // ── RECOVERY MODE — 3+ consecutive losses ─────────────────────────
  // Require high-conviction only AND bump risk to recover faster.
  // Fewer trades, better setups, larger position on those setups.
  const streakDir  = streak?.dir || "";
  const streakCur  = streak?.cur || 0;
  const inRecovery = streakDir==="L" && streakCur>=3;
  if(inRecovery){
    // Only high-conviction signals trade during recovery (enforced at call site via minConf+2)
    riskPct = Math.max(riskPct, 0.060); // floor at 6% — recover with purpose, not desperation
  }

  // ── HOT STREAK MULTIPLIER — 3+ consecutive wins ───────────────────
  // Exploit momentum runs without permanently raising baseline risk.
  // Resets immediately on any loss.
  const hotStreak = streakDir==="W" && streakCur>=3;
  if(hotStreak && !inRecovery){
    riskPct = riskPct * 1.20; // +20% on momentum — capped by absolute max below
  }

  // ── ABSOLUTE MAX CAP — anchored to SESSION START balance ──────────
  // Prevents over-leveraging on a compounded hot run.
  // On $50 start: max $7.50/trade ever. On $10 stress test: max $1.50/trade.
  const sessionStartBal = startBalance || dayStartBal;
  const absoluteMaxRiskDollars = sessionStartBal * 0.15;

  // ── CAPITAL ZONE ADJUSTMENTS ──────────────────────────────────────
  if(inDanger)        riskPct = riskPct * 0.30; // 30% of normal — danger zone
  else if(inCaution)  riskPct = riskPct * 0.55; // 55% of normal — caution zone

  // ── EXNESS HMR BLACKOUT WINDOWS — reduce lots during high margin periods ──
  // Per Exness docs: leverage caps to 1:1000 during these windows.
  // We reduce lots 50% rather than halt — keep trading, reduce exposure.
  let hmrActive = false;
  if(hourGMT!=null){
    const minUTC = (hourGMT % 1) * 60;
    // 30 min before XAU daily break (23:30–00:00 GMT)
    if(hourGMT>=23.5 || hourGMT<0.1) hmrActive = true;
    // 4 hours before Friday close (20:00–00:00 GMT Friday)
    // Friday = day 5 in JS (0=Sun)
    const dayUTC = new Date().getUTCDay();
    if(dayUTC===5 && hourGMT>=20) hmrActive = true;
    // 1 hour after Sunday open (00:00–01:00 GMT Sunday)
    if(dayUTC===0 && hourGMT<1.0) hmrActive = true;
  }
  if(hmrActive) riskPct = riskPct * 0.50;

  // ── RISK DOLLARS (pre-commission) ────────────────────────────────
  let riskDollars = Math.min(balance * riskPct, absoluteMaxRiskDollars);

  // ── COMMISSION AWARENESS ──────────────────────────────────────────
  // On Exness Zero: ~$9 round-trip per full lot.
  // Deduct estimated commission from risk budget so the bot never
  // sizes into a trade where commission alone eats the expected profit.
  // Minimum lot estimate first, then refine.
  const estLots      = riskDollars / (Math.max(slD, 1.50) * pip);
  const estCommission = Math.min(estLots, 5.0) * EXNESS_COMMISSION_PER_LOT_RT;
  // Only deduct if commission is material (>5% of risk budget)
  if(estCommission > riskDollars * 0.05){
    riskDollars = Math.max(riskDollars - estCommission, balance * 0.01);
  }

  // ── LOT CALCULATION ───────────────────────────────────────────────
  // Lots = riskDollars / (slD × pip)
  // slD floor raised to 1.50 in calcHFTSL — but guard here too
  const effectiveSLD = Math.max(slD, 1.50);
  const lotRaw = riskDollars / (effectiveSLD * pip);

  // ── MARGIN SAFETY GUARD — never use >40% of equity as margin ─────
  // At 1:2000, margin per lot = (goldPrice × 100) / 2000
  // Approximate gold price if not passed in
  const goldPrice = livePrice || 3300; // fallback to ~current gold price
  const marginPerLot = (goldPrice * 100) / EXNESS_LEVERAGE; // ~$165/lot at $3300
  const maxLotsFromMargin = (balance * EXNESS_MARGIN_SAFETY) / Math.max(marginPerLot, 1);

  const lots = +Math.min(
    Math.max(lotRaw, MIN_LOT),
    5.0,
    maxLotsFromMargin
  ).toFixed(2);

  return{lots, riskDollars:+riskDollars.toFixed(2), riskPct,
         phase, hotStreak, inRecovery, hmrActive};
}

// ── HELPERS ────────────────────────────────────────────────────────
const nearRound=(p,w=1.5)=>{
  const interval=p>5000?1000:100;
  const scaled=w*(interval/100);
  return Math.abs(p-Math.round(p/interval)*interval)<=scaled;
};
function snapTP(tp,dir){
  // Snap interval: $50 for XAU (price ≤ 5000), $500 for higher
  // FIX: institutions place limits AT round numbers, not $2.50 beyond.
  // New logic: if TP is within tolerance of a round number, snap to JUST
  // BEFORE it in the trade direction so we exit before the wall, not into it.
  const interval=tp>5000?500:50;
  const tol=tp>5000?35:3.5;
  const off=tp>5000?8:0.8; // small buffer before the round number
  const r=Math.round(tp/interval)*interval;
  if(Math.abs(tp-r)<tol){
    // BUY: snap to just below the round number (exit before overhead supply)
    // SELL: snap to just above the round number (exit before underlying demand)
    return dir==="BUY"?r-off:r+off;
  }
  return tp;
}

function calcATR(cs,p=20){
  // Period raised 12→20: captures true XAU volatility over wider window.
  // ATR(12) on 1M was under-reading danger distance during NY/London sessions.
  if(!cs||cs.length<2)return 2.0;
  const sl=cs.slice(-(p+1));
  const trs=sl.map((c,i,a)=>!i?c.high-c.low:Math.max(c.high-c.low,Math.abs(c.high-a[i-1].close),Math.abs(c.low-a[i-1].close)));
  const raw=trs.reduce((s,v)=>s+v,0)/trs.length;
  return Math.max(raw,0.50);
}

// ── ROLLING ATR AVERAGE (50-period) — for regime detection ────────
function calcAvgATR(cs, p=20, avgP=50){
  if(!cs||cs.length<p+2)return calcATR(cs,p);
  // Sample avgP individual ATR snapshots across history
  const step=Math.max(1,Math.floor(cs.length/avgP));
  let sum=0,cnt=0;
  for(let i=p+1;i<cs.length;i+=step){
    const slice=cs.slice(Math.max(0,i-p-1),i);
    sum+=calcATR(slice,p);cnt++;
  }
  return cnt>0?Math.max(sum/cnt,0.50):calcATR(cs,p);
}

// ── ATR REGIME CLASSIFIER ──────────────────────────────────────────
// Returns "dead"|"normal"|"expansion"
// dead     → ATR < 80% of avg → skip trades completely
// expansion→ ATR > 130% of avg → allow pyramiding + boost lots
function detectATRRegime(atrNow, atrAvg){
  if(atrAvg<=0)return"normal";
  if(atrNow<atrAvg*0.80)return"dead";
  if(atrNow>atrAvg*1.30)return"expansion";
  return"normal";
}

// ── SESSION LOT BOOST ──────────────────────────────────────────────
// Conservative multipliers: boost size in high-liquidity sessions
function getSessionBoost(hourGMT){
  if(hourGMT>=7  && hourGMT<12 )return 1.35; // London
  if(hourGMT>=13 && hourGMT<17 )return 1.65; // NY
  if(hourGMT>=0  && hourGMT<5  )return 0.80; // Asia quiet
  return 1.0;
}

// ── STRATEGY WEIGHT TABLE (shared mutable ref, reset on new session) ─
// getStratWeight(name, table) → multiplier 0.5–1.5
function getStratWeight(name, table){
  if(!table||!table[name])return 1.0;
  const s=table[name];
  const total=s.w+s.l;
  if(total<10)return 1.0; // not enough data yet
  const wr=s.w/total;
  return Math.min(1.5, Math.max(0.5, 0.5+wr));
}

// ── ULTRA LOT SIZE — for very high conviction signals (score ≥ 5) ──
function ultraLotMult(score, balance){
  let m=1.0;
  if(score>=6)m=2.0;
  else if(score===5)m=1.60;
  else if(score>=4)m=1.30;
  // Small account boost (< $100) → slightly larger to grow faster
  if(balance<100)m=Math.min(m*1.25, 2.5);
  return m;
}

// ── HYBRID GROWTH ENGINE (HGE) ──────────────────────────────────────
// Extra validation layer: classifies market and decides whether to
// open a trade. Does NOT replace masterSignal — runs AFTER it.
// Returns {allow:bool, riskMult:number, pyramidOk:bool}
function hgeFilter({atrNow, atrAvg, voteStrength, mktState, balance, equityPeak}){
  const regime=detectATRRegime(atrNow, atrAvg);
  if(regime==="dead")return{allow:false,riskMult:0,pyramidOk:false,regime};

  // Vote agreement gate: >60% of strategies must agree
  if(voteStrength<0.50)return{allow:false,riskMult:0,pyramidOk:false,regime};
  // Chop needs stronger consensus
  if(mktState==="RANGING"&&voteStrength<0.75)return{allow:false,riskMult:0,pyramidOk:false,regime};

  // Equity curve scaling
  const peak=Math.max(equityPeak||balance, balance);
  const dd=(peak-balance)/Math.max(peak,0.01);
  let eqMult=1.0;
  if(dd>0.05&&dd<=0.15)eqMult=0.60;
  else if(balance>peak*1.0)eqMult=1.15;

  // Market state risk multiplier
  let stateMult=1.0;
  if(regime==="expansion")stateMult=1.30;
  if(mktState==="RANGING")stateMult=0.70;

  const riskMult=Math.min(eqMult*stateMult, 2.0);
  const pyramidOk=regime==="expansion"&&mktState!=="RANGING";
  return{allow:true,riskMult,pyramidOk,regime};
}

// Aggregate 1M candles into higher TF candles
function aggregateCandles(m1Candles, tfMins){
  if(!m1Candles||!m1Candles.length)return[];
  const out=[];let cur=null;
  for(const c of m1Candles){
    const slot=Math.floor(c.ts/(tfMins*60000))*(tfMins*60000);
    if(!cur||cur.ts!==slot){
      if(cur)out.push(cur);
      cur={ts:slot,open:c.open,high:c.high,low:c.low,close:c.close,
           bull:c.close>=c.open,body:Math.abs(c.close-c.open),
           range:c.high-c.low,vol:c.vol||0};
    }else{
      cur.high=Math.max(cur.high,c.high);
      cur.low=Math.min(cur.low,c.low);
      cur.close=c.close;
      cur.bull=cur.close>=cur.open;
      cur.body=Math.abs(cur.close-cur.open);
      cur.range=cur.high-cur.low;
      cur.vol=(cur.vol||0)+(c.vol||0);
    }
  }
  if(cur)out.push(cur);
  return out;
}

// ── Parse raw candle objects from any source into standard format ──
function parseCandle(o,h,l,c,ts,vol=0){
  const op=+o,hi=+h,lo=+l,cl=+c;
  return{ts,open:op,high:hi,low:lo,close:cl,vol:+vol||0,
    bull:cl>=op,body:Math.abs(cl-op),range:hi-lo};
}

// ══════════════════════════════════════════════════════════════════
//  DERIV HISTORICAL CANDLES — wss://ws.binaryws.com/websockets/v3
//  Public API, NO KEY REQUIRED. Returns up to 5000 OHLCV candles
//  for frxXAUUSD at any granularity.
//
//  Deriv granularity options (seconds):
//  60=1M, 120=2M, 180=3M, 300=5M, 600=10M, 900=15M,
//  1800=30M, 3600=1H, 7200=2H, 14400=4H, 28800=8H, 86400=1D
// ══════════════════════════════════════════════════════════════════
function fetchDerivCandles(granularitySecs, count, endEpoch, derivSymbol="frxXAUUSD"){
  return new Promise((resolve,reject)=>{
    const ws=new WebSocket("wss://ws.binaryws.com/websockets/v3?app_id=1089");
    let done=false;
    const timeout=setTimeout(()=>{
      if(!done){done=true;ws.close();reject(new Error("Deriv candles timeout"));}
    },20000);

    ws.onopen=()=>{
      const req={
        ticks_history:derivSymbol,
        adjust_start_time:1,
        count:Math.min(count,5000),
        end:endEpoch?String(endEpoch):"latest",
        granularity:granularitySecs,
        style:"candles",
      };
      ws.send(JSON.stringify(req));
    };

    ws.onmessage=e=>{
      if(done)return;
      const d=JSON.parse(e.data);
      if(d.error){done=true;clearTimeout(timeout);ws.close();reject(new Error(d.error.message));return;}
      if(d.candles&&d.candles.length>0){
        done=true;clearTimeout(timeout);ws.close();
        const candles=d.candles.map(c=>parseCandle(c.open,c.high,c.low,c.close,c.epoch*1000,0))
          .filter(c=>c.open>0.01).sort((a,b)=>a.ts-b.ts);
        resolve(candles);
      }
    };
    ws.onerror=()=>{if(!done){done=true;clearTimeout(timeout);reject(new Error("Deriv WS error"));}};
    ws.onclose=()=>{if(!done){done=true;clearTimeout(timeout);reject(new Error("Deriv WS closed"));}};
  });
}

// Fetch multiple Deriv pages to cover longer lookback periods
// Deriv max = 5000 candles per request; at 1M that's ~3.5 days
// To get weeks/months we request pages walking backward in time
async function fetchDerivHistory(granSecs, lookbackDays, onProgress, derivSymbol="frxXAUUSD"){
  const candlesPerDay=Math.floor(86400/granSecs);
  const totalNeeded=Math.ceil(lookbackDays*candlesPerDay*1.15);// +15% buffer for weekends/gaps
  const maxPerPage=5000;
  const pages=Math.ceil(totalNeeded/maxPerPage);

  let allCandles=[];
  let endEpoch=null;// null = "latest" for first page

  onProgress(`📡 Deriv: fetching ${totalNeeded} candles (${pages} page${pages>1?"s":""})...`);

  for(let p=0;p<pages;p++){
    try{
      onProgress(`📡 Deriv page ${p+1}/${pages}...`);
      const batch=await fetchDerivCandles(granSecs,maxPerPage,endEpoch,derivSymbol);
      if(!batch||batch.length===0)break;
      // Prepend (older data first)
      allCandles=[...batch,...allCandles.filter(c=>c.ts>batch[batch.length-1].ts)];
      // Next page: go back from oldest candle in this batch
      endEpoch=Math.floor(batch[0].ts/1000)-1;
      if(allCandles.length>=totalNeeded)break;
    }catch(e){
      if(p===0)throw e;// fail hard only on first page
      onProgress(`⚠ Deriv page ${p+1} failed: ${e.message} — using data so far`);
      break;
    }
  }

  // Deduplicate and sort
  const seen=new Set();
  const deduped=allCandles.filter(c=>{if(seen.has(c.ts))return false;seen.add(c.ts);return true;})
    .sort((a,b)=>a.ts-b.ts);

  onProgress(`✓ Deriv: ${deduped.length} candles loaded`);
  return deduped;
}

// ── LIVE PRICE FEEDS ───────────────────────────────────────────────

// Deriv WebSocket — public, no key
// Improvements vs original:
//  1. Visibility reconnect — if tab was backgrounded, reconnects immediately on focus
//  2. Stale-feed watchdog — if no tick arrives within 45s, force-reconnects
//  3. Exponential backoff on reconnect (2s → 4s → 8s, max 15s)
//  4. Clears ping interval before each new connect to avoid ghost intervals
function createDerivFeed(onTick,onStatus,derivTickSymbol="frxXAUUSD"){
  let ws=null,alive=true,pingIv=null,watchdogIv=null,lastTickTs=Date.now(),retryDelay=500;

  function teardown(){
    clearInterval(pingIv);pingIv=null;
    clearInterval(watchdogIv);watchdogIv=null;
    if(ws){try{ws.onopen=ws.onmessage=ws.onerror=ws.onclose=null;ws.close();}catch(_){}}
    ws=null;
  }

  function connect(){
    if(!alive)return;
    teardown();
    onStatus("Connecting to Deriv...");
    try{ws=new WebSocket("wss://ws.binaryws.com/websockets/v3?app_id=1089");}
    catch(e){onStatus("WS create failed, retrying...");scheduleReconnect();return;}
    ws.onopen=()=>{
      if(!alive){ws.close();return;}
      retryDelay=2000;// reset backoff on successful connect
      ws.send(JSON.stringify({ticks:derivTickSymbol,subscribe:1}));
      onStatus("● Deriv LIVE");
      lastTickTs=Date.now();
      // Heartbeat every 12s — keeps connection warm, Deriv closes at 60s idle
      pingIv=setInterval(()=>{if(ws&&ws.readyState===1)ws.send(JSON.stringify({ping:1}));},12000);
      // Watchdog: if no tick for 45s, assume feed is dead and reconnect
      watchdogIv=setInterval(()=>{
        if(Date.now()-lastTickTs>20000){
          onStatus("⚠ Feed stale — reconnecting...");
          scheduleReconnect();
        }
      },10000);
    };
    let _prevTickQ=0;
    ws.onmessage=e=>{
      try{
        const d=JSON.parse(e.data);
        if(d.tick&&d.tick.quote){
          lastTickTs=Date.now();
          const _q=+d.tick.quote;
          if(_q===_prevTickQ)return; // skip zero-move ticks (Deriv re-sends same price)
          _prevTickQ=_q;
          onTick(_q,d.tick.ask,d.tick.bid,Date.now());
        }
      }catch(_){}
    };
    ws.onerror=()=>{if(alive)onStatus("Deriv error");};
    ws.onclose=()=>{if(alive)scheduleReconnect();};
  }

  function scheduleReconnect(){
    teardown();
    if(!alive)return;
    onStatus("Deriv reconnecting...");
    setTimeout(connect,retryDelay);
    retryDelay=Math.min(retryDelay*2,8000); // exponential backoff, cap 8s
  }

  // Reconnect immediately when tab regains focus (browsers throttle timers in background)
  function onVisible(){
    if(document.visibilityState==="visible"&&alive){
      const stale=Date.now()-lastTickTs>10000;
      if(stale){onStatus("Tab resumed — reconnecting...");connect();}
    }
  }
  document.addEventListener("visibilitychange",onVisible);

  connect();
  return{
    close:()=>{
      alive=false;
      teardown();
      document.removeEventListener("visibilitychange",onVisible);
    }
  };
}

// ─── FAMILY A: MOMENTUM ──────────────────────────────────────────
function s_Impulse(cs,atr){
  if(!cs||cs.length<2)return null;
  const c=cs[cs.length-1];
  const bPct=c.body/Math.max(c.range,0.01);
  if(c.body>=atr*0.75&&bPct>=0.42)return{dir:c.bull?"BUY":"SELL",name:"IMPULSE",fam:"A"};
  return null;
}
function s_Trend(cs,atr){
  if(!cs||cs.length<4)return null;
  const c=cs[cs.length-1],p1=cs[cs.length-2],p2=cs[cs.length-3];
  if(c.bull&&p1.bull&&c.close>p1.close&&p1.close>p2.close&&c.body>atr*0.45)return{dir:"BUY",name:"TREND",fam:"A"};
  if(!c.bull&&!p1.bull&&c.close<p1.close&&p1.close<p2.close&&c.body>atr*0.45)return{dir:"SELL",name:"TREND",fam:"A"};
  return null;
}
function s_ORB(cs,orb){
  if(!orb||!cs||cs.length<2)return null;
  const c=cs[cs.length-1],p=cs[cs.length-2];
  if(c.close>orb.high&&c.bull&&p.close<=orb.high)return{dir:"BUY",name:"ORB",fam:"B"};
  if(c.close<orb.low&&!c.bull&&p.close>=orb.low)return{dir:"SELL",name:"ORB",fam:"B"};
  return null;
}
function s_FVG(cs){
  if(!cs||cs.length<3)return null;
  const[a,,b]=cs.slice(-3);const c=cs[cs.length-1];
  const tol=0.8;
  if(b.low>a.high&&c.low<=b.low+tol&&c.close>=a.high&&c.bull)return{dir:"BUY",name:"FVG",fam:"B"};
  if(b.high<a.low&&c.high>=b.high-tol&&c.close<=a.low&&!c.bull)return{dir:"SELL",name:"FVG",fam:"B"};
  return null;
}
// A3 — MOMENTUM CONTINUATION: big candle → pause → continuation
function s_MomentumContinuation(cs,atr){
  if(!cs||cs.length<4)return null;
  const big=cs[cs.length-4],pause1=cs[cs.length-3],pause2=cs[cs.length-2],c=cs[cs.length-1];
  if(big.body<atr*0.70)return null;
  if(pause1.body>atr*0.35||pause2.body>atr*0.35)return null;
  if(big.bull&&c.bull&&c.close>pause1.high&&c.body>atr*0.30)return{dir:"BUY",name:"MC",fam:"A"};
  if(!big.bull&&!c.bull&&c.close<pause1.low&&c.body>atr*0.30)return{dir:"SELL",name:"MC",fam:"A"};
  return null;
}
// A4 — BREAKOUT RETEST: breaks level, pulls back, holds, continues
function s_BreakoutRetest(cs,atr){
  if(!cs||cs.length<8)return null;
  const lookback=cs.slice(-8,-1);
  const brkH=Math.max(...lookback.map(x=>x.high));
  const brkL=Math.min(...lookback.map(x=>x.low));
  const c=cs[cs.length-1],p=cs[cs.length-2];
  if(p.high>brkH&&c.low<=brkH+atr*0.3&&c.close>brkH&&c.bull&&c.body>atr*0.25)
    return{dir:"BUY",name:"BRK-RT",fam:"A"};
  if(p.low<brkL&&c.high>=brkL-atr*0.3&&c.close<brkL&&!c.bull&&c.body>atr*0.25)
    return{dir:"SELL",name:"BRK-RT",fam:"A"};
  return null;
}
// A5 — HH/HL or LH/LL CONTINUATION: structural trend confirmation
function s_HHLLContinuation(cs,atr){
  if(!cs||cs.length<10)return null;
  const s=cs.slice(-10);
  const highs=[],lows=[];
  for(let i=1;i<s.length-1;i++){
    if(s[i].high>s[i-1].high&&s[i].high>s[i+1].high)highs.push(s[i].high);
    if(s[i].low<s[i-1].low&&s[i].low<s[i+1].low)lows.push(s[i].low);
  }
  const c=cs[cs.length-1];
  if(highs.length>=2&&highs[highs.length-1]>highs[highs.length-2]&&
     lows.length>=2&&lows[lows.length-1]>lows[lows.length-2]&&c.bull)
    return{dir:"BUY",name:"HH-HL",fam:"A"};
  if(highs.length>=2&&highs[highs.length-1]<highs[highs.length-2]&&
     lows.length>=2&&lows[lows.length-1]<lows[lows.length-2]&&!c.bull)
    return{dir:"SELL",name:"LH-LL",fam:"A"};
  return null;
}
// ─── FAMILY B: STRUCTURE ─────────────────────────────────────────
function s_SMC(cs,fakeLog){
  if(!cs||cs.length<22)return null;
  const prev=cs.slice(-22,-2);
  const swH=Math.max(...prev.map(x=>x.high)),swL=Math.min(...prev.map(x=>x.low));

}
// ─── FAMILY C: REVERSAL ──────────────────────────────────────────
function s_Pattern(cs){
  if(!cs||cs.length<4)return null;
  const[,c2,c1,c0]=cs.slice(-4);
  if(c0.bull&&!c1.bull&&c0.body>c1.body*1.04&&c0.open<c1.close&&c0.close>c1.open)return{dir:"BUY",name:"ENGULF",fam:"C"};
  if(!c0.bull&&c1.bull&&c0.body>c1.body*1.04&&c0.open>c1.close&&c0.close<c1.open)return{dir:"SELL",name:"ENGULF",fam:"C"};
  const lw=c0.bull?c0.open-c0.low:c0.close-c0.low,uw=c0.bull?c0.high-c0.close:c0.high-c0.open;
  if(lw>c0.body*2&&uw<c0.body*0.35&&c0.body>0.1)return{dir:"BUY",name:"HAMMER",fam:"C"};
  if(uw>c0.body*2&&lw<c0.body*0.35&&c0.body>0.1)return{dir:"SELL",name:"STAR",fam:"C"};
  if(c0.bull&&c1.bull&&c2.bull&&c0.close>c1.close&&c1.close>c2.close)return{dir:"BUY",name:"3-BULL",fam:"C"};
  if(!c0.bull&&!c1.bull&&!c2.bull&&c0.close<c1.close&&c1.close<c2.close)return{dir:"SELL",name:"3-BEAR",fam:"C"};

function getSETERiskMult(stage){
  if(stage==="BUILD")return 1.0;
  if(stage==="PUSH")return 1.8;
  return 0.5; // LOCK — de-risk
}

// Update SETE strategy performance after trade closes
function updateSETEPerformance(ids,won,regime){
  if(!ids||!ids.length)return;
  ids.forEach(id=>{
    if(id<0||id>=SETE_STRATEGIES.length)return;
    const s=SETE_STRATEGIES[id];
    s.recent.push(won?1:0);
    if(s.recent.length>20)s.recent.shift();
    const wr=s.recent.length?s.recent.reduce((a,b)=>a+b,0)/s.recent.length:0.5;
    s.weights[regime]=seteClamp(0.5+(wr*1.5),0.5,2.0);
    s.score=seteClamp(0.7+(wr*0.6),0.7,1.5);
  });
}

// Decay SETE weights towards baseline (called periodically to forget stale data)
function decayWeights(){
  SETE_STRATEGIES.forEach(s=>{
    for(const k in s.weights){
      s.weights[k]=seteClamp(s.weights[k]*0.97,0.5,2.0);
    }
    s.score=seteClamp(s.score*0.98,0.7,1.5);
  });
}

// ══════════════════════════════════════════════════════════════════
//  MASTER SIGNAL ENGINE — 30 strategies, 5 families
//  Family diversity gate: ≥2 families must agree to open a trade
//  SMC/CHoCH dedup: same structural event — only one counts
//  Market-state adaptive RR: TRENDING / RANGING / NORMAL
// ══════════════════════════════════════════════════════════════════
// ══════════════════════════════════════════════════════════════════
//  NEWS BLACKOUT — blocks/warns when high-impact news is imminent
//  Blackout window: 5 min before → 15 min after event time
//  Medium impact: 2 min before → 5 min after
//  Input: array of news objects from fetchNews()
//  {title, date, impact, forecast, actual, dir}
//  FF Calendar date field: "MM-DD-YYYY" or "YYYY-MM-DD" + optional time
// ══════════════════════════════════════════════════════════════════
function isNewsBlackout(newsArr){
  if(!newsArr||!newsArr.length)return false;
  const now=Date.now();
  for(const ev of newsArr){
    if(!ev||!ev.date)continue;
    // Parse the event datetime — FF calendar uses "MM-DD-YYYY HH:MM" or ISO
    let evMs=0;
    try{
      const d=ev.date;
      // Try direct parse first (works for ISO strings)
      const direct=Date.parse(d);
      if(!isNaN(direct)&&direct>0){
        evMs=direct;
      } else {
        // Fallback: "MM-DD-YYYY" → "YYYY-MM-DD"
        const parts=d.split(/[-/]/);
        if(parts.length>=3){
          const iso=parts[2]+'-'+parts[0].padStart(2,'0')+'-'+parts[1].padStart(2,'0');
          evMs=Date.parse(iso);
        }
      }
    }catch{continue;}
    if(!evMs||isNaN(evMs))continue;
    const diffMin=(evMs-now)/60000; // negative = event already passed
    const isHigh=ev.impact==="High";
    const isMed =ev.impact==="Medium";
    // High impact: block 5 min before → 15 min after
    if(isHigh&&diffMin>=-15&&diffMin<=5)return true;
    // Medium impact: block 2 min before → 5 min after
    if(isMed &&diffMin>=-5 &&diffMin<=2)return true;
  }
  return false;
}

function masterSignal({cs,hour,kL,spread,orb,news,newsArr,fakeLog,minConf,tfCandles,inst,mktState}){
  const _inst=inst||_currentInst||"XAUUSD";
  const spreadLimit=SPREAD_LIMITS[_inst]??MAX_SPREAD;
  if(!cs||cs.length<5)return null;
  if(spread>spreadLimit*3)return null;
  if(isNewsBlackout(newsArr||[]))return null;
  const c=cs[cs.length-1];
  const atr=calcATR(cs);
  const atrPct=(atr/Math.max(c.close,1))*100;
  const atrHigh=atrPct>0.30,atrLow=atrPct<0.04;
  const effectiveMinConf=atrLow?Math.max(minConf-1,2):minConf;
  const mtfBias=tfCandles?getMTFBias(tfCandles):0;

  const rawStrategies=[
    s_Impulse(cs,atr),s_Trend(cs,atr),s_MomentumContinuation(cs,atr),
    s_BreakoutRetest(cs,atr),s_HHLLContinuation(cs,atr),
    s_ORB(cs,orb),s_FVG(cs),s_SMC(cs,fakeLog),s_OB(cs,atr),
    s_CHoCH(cs,atr),s_Sweep(cs,atr),s_InsideBar(cs,atr),
    s_Pattern(cs),s_DoubleTopBottom(cs,atr),s_PinBarRejection(cs,atr,kL),
    s_TurtleSoup(cs,atr),s_Wedge(cs,atr),s_ThreeDrive(cs,atr),s_ExhaustionFade(cs,atr),
    s_KZ(cs,hour,kL),s_Asian(cs,hour,kL),s_LondonOpen(cs,hour,atr),
    s_NYReversal(cs,hour,kL,atr),s_EODFade(cs,hour,atr),
    s_LiquidityVoid(cs,atr),s_MSBRetest(cs,atr),s_PremiumDiscount(cs,atr),
    s_PowerOfThree(cs,atr),s_VolumeClimax(cs,atr),s_Wyckoff(cs,atr),
  ].filter(Boolean);

  // SMC/CHoCH dedup — same structural break, keep only SMC
  let strategies=[...rawStrategies];
  const smcDir=strategies.find(s=>s.name==="SMC")?.dir;
  const chochDir=strategies.find(s=>s.name==="CHoCH")?.dir;
  if(smcDir&&chochDir&&smcDir===chochDir){
    strategies=strategies.filter(s=>s.name!=="CHoCH");
  }

  // ── SETE v2 regime for this signal evaluation ──────────────────
  const seteRegime=computeSETERegime(cs,atr);

  let B=0,S=0;
  const buyFams=new Set(),sellFams=new Set();
  const buyFamCounts={},sellFamCounts={};
  strategies.forEach(sig=>{
    // SETE weight: strategies with higher recent win-rate get more vote weight
    const seteW=getSETEWeight(sig.name,seteRegime);
    const voteW=Math.max(seteW,0.35); // floor so a single strategy can still contribute
    if(sig.dir==="BUY"){
      B+=voteW;buyFams.add(sig.fam);
      buyFamCounts[sig.fam]=(buyFamCounts[sig.fam]||0)+voteW;
    }else{
      S+=voteW;sellFams.add(sig.fam);
      sellFamCounts[sig.fam]=(sellFamCounts[sig.fam]||0)+voteW;
    }
  });

  const activeNewsTrade=getActiveNewsTrade(newsArr||[]);
  if(activeNewsTrade?.dir==="BUY")B+=1;
  else if(activeNewsTrade?.dir==="SELL")S+=1;

  if(B===S)return null;
  const rawDir=(B>S)?"BUY":"SELL";

  // GATE: fire if ANY single family has >=2 votes in signal direction,
  // OR total votes meet effectiveMinConf (catches multi-family setups).
  const activeFamCounts=rawDir==="BUY"?buyFamCounts:sellFamCounts;
  const activeFams=rawDir==="BUY"?buyFams:sellFams;
  const maxFamVotes=Math.max(0,...Object.values(activeFamCounts));
  const totalVotes=rawDir==="BUY"?B:S;
  if(maxFamVotes<2&&totalVotes<effectiveMinConf)return null;

  // MTF bias: used for display/confirmation tags only — no longer hard-vetos signals
  const hasMTFData=tfCandles&&tfCandles.h1&&tfCandles.h1.length>=3;

  const dir=rawDir;
  const score=totalVotes;
  const strengthFloor=40,strengthRange=60;
  const strength=score<=effectiveMinConf
    ?strengthFloor
    :Math.min(100,Math.round(strengthFloor+(score-effectiveMinConf)/(30-effectiveMinConf)*strengthRange));

  const confirmTags=strategies.filter(sig=>sig.dir===dir).map(sig=>sig.name);
  if(activeNewsTrade&&activeNewsTrade.dir===dir)confirmTags.push(`${activeNewsTrade.impact.toUpperCase()}-NEWS`);
  if(mtfBias!==0)confirmTags.push(mtfBias>0?"HTF↑":"HTF↓");
  // Show dominant family: e.g. "A×3" meaning Family A had 3 votes
  const topFam=Object.entries(activeFamCounts).sort((a,b)=>b[1]-a[1])[0];
  if(topFam)confirmTags.push(`${topFam[0]}×${topFam[1]}`);

  if(nearRound(c.close,0.5))return null; // only block when price is exactly at a $100 round number (±$0.50)
  const extMult=3.0; // block only if price is very extended (3×ATR beyond prev day high/low)
  if(dir==="BUY"&&kL.pdh&&c.close>kL.pdh+atr*extMult)return null;
  if(dir==="SELL"&&kL.pdl&&c.close<kL.pdl-atr*extMult)return null;

  const entry=+c.close.toFixed(2);
  const hourGMT=hour||new Date().getUTCHours();
  // Use a reasonable default balance (500) so SL cap isn't absurdly tight.
  // Caller should pass balance via opts if available — see processCandle.
  const{sl,slD}=calcHFTSL({cs,dir,entry,atr,spread,hourGMT,balance:500,inst:_inst});

  // Market-state adaptive RR
  const state=mktState||"NORMAL";
  const rr=state==="TRENDING"?[2.0,4.0,8.0]:state==="RANGING"?[1.2,2.0,3.5]:[1.5,3.0,6.0];
  const tp1=+snapTP(dir==="BUY"?entry+slD*rr[0]:entry-slD*rr[0],dir).toFixed(2);
  const tp2=+snapTP(dir==="BUY"?entry+slD*rr[1]:entry-slD*rr[1],dir).toFixed(2);
  const tp3=+(dir==="BUY"?entry+slD*rr[2]:entry-slD*rr[2]).toFixed(2);

  // SETE opportunity score — boosts strength in high-quality environments
  const seOpp=seteOpportunityScore({regime:seteRegime,signalStrength:(totalVotes/30),hour:hourGMT});
  const seteStage=getSETEStage((totalVotes/30)-0.5); // approximate gain from signal score
  const seStrBoost=seOpp>0.75?5:seOpp>0.55?2:0;    // +5% or +2% strength boost

  // Collect SETE strategy IDs for performance tracking after trade close
  const seteIds=[...new Set(strategies.filter(sig=>sig.dir===dir).map(sig=>PA_TO_SETE_ID[sig.name]).filter(id=>id!==undefined))];

  return{dir,entry,sl,tp1,tp2,tp3,slD:+slD.toFixed(2),score,
    strength:Math.min(100,strength+seStrBoost),
    confirms:confirmTags.join(" · "),atr:+atr.toFixed(2),atrHigh,
    buyVotes:+B.toFixed(1),sellVotes:+S.toFixed(1),mtfBias,famCount:activeFams.size,rr,
    seteIds,seteRegime,seteOpp:+seOpp.toFixed(2),seteStage};
}

// ══════════════════════════════════════════════════════════════════
//  MODE RR OVERRIDE — adjusts TP levels after signal is selected
//  SNIPER  RR 1:3 → 1:5+ (wide targets, high-conviction trend)
//  SCALP   RR 1:1 → 1:2   (tight targets, range environment)
//  BALANCED: keep masterSignal defaults (1.8 / 3.2 / 5.5)
// ══════════════════════════════════════════════════════════════════
// applyModeRR removed — unified signal mode uses masterSignal RR directly

// ══════════════════════════════════════════════════════════════════
//  HFT TRADE MANAGER
//
//  BE logic:
//   - SL is FROZEN until price reaches the MIDPOINT (50%) between
//     entry and TP1. Not before — no bumper BE.
//   - At midpoint, SL snaps to entry. Free trade from that point.
//
//  Trailing (activates only after TP1 is hit):
//   - Phase A (TP1→TP2):  1.5× ATR  — room for the move
//   - Phase B (TP2→TP3):  1.0× ATR  — tightening
//   - Phase C (post-TP3): 0.6× ATR  — locked in
//   - highWater/lowWater persists on the trade object (not recomputed
//     each tick) — this is what prevents bumper-to-bumper trailing.
// ══════════════════════════════════════════════════════════════════
function manageTrade(t, price, atr, liveProvider, pip=10){
  const tr={...t};
  const inst=tr.inst||_currentInst||"XAUUSD";

  // Live P&L
  tr.pnl=tr.dir==="BUY"
    ?+((price-tr.entry)*pip*tr.lots).toFixed(2)
    :+((tr.entry-price)*pip*tr.lots).toFixed(2);

  // Track running peak/trough continuously
  if(tr.dir==="BUY"){
    tr.highWater=tr.highWater!=null?Math.max(tr.highWater,price):price;
  }else{
    tr.lowWater=tr.lowWater!=null?Math.min(tr.lowWater,price):price;
  }

  // ── TRAILING STOP LOGIC ──────────────────────────────────────────
  // Activation : price must reach EXACTLY 50% of entry→TP1 distance
  //   BUY  activation price = entry + (tp1 - entry) × 0.50
  //   SELL activation price = entry - (entry - tp1) × 0.50
  //
  // Example: BUY @4300, SL @4280, TP1 @4380.10, TP2 @4440
  //   activationPrice = 4300 + (4380.10 - 4300) × 0.50 = 4340.05
  //   At 4340.05 → trail MUST snap to Breakeven (entry = 4300)
  //   At 4380.10 → trail = entry + (price - entry) × 0.40
  //             = 4300 + (4380.10 - 4300) × 0.40 = 4300 + 32.04 = 4332.04
  //
  // Trail formula (post-activation):
  //   BUY  trailSL = entry + (price − entry) × 0.40   [sits 40% up from entry]
  //   SELL trailSL = entry − (entry − price) × 0.40   [sits 40% down from entry]
  //   Ratchet — SL only ever moves in the profit direction, never back.

  // Activation distance = 50% of entry→TP1 distance
  const tp1Dist=tr.tp1!=null?Math.abs(tr.tp1-tr.entry):Math.max((tr.slD||Math.abs(tr.entry-tr.sl)||2.0)*1.5,0.01);
  const activationDist=tp1Dist*0.50; // trigger at exactly 50% of entry→TP1

  if(tr.dir==="BUY"){
    const moved=price-tr.entry;
    if(moved>=activationDist){
      // Step 1: First-activation tick — snap SL to Breakeven, stop here.
      // The 40% advancement starts on the NEXT price update.
      if(!tr.beDone){
        tr.sl=tr.entry; // exact BE
        tr.beDone=true;
        tr.trailing=true;
      }else{
        // Step 2: Post-activation — trail at 40% of total move from entry
        // Ratchet: SL only advances toward profit, never retreats
        const newSL=+(tr.entry+(price-tr.entry)*0.40).toFixed(2);
        if(newSL>tr.sl)tr.sl=newSL;
      }
    }
  }else{
    const moved=tr.entry-price;
    if(moved>=activationDist){
      // Step 1: First-activation tick — snap SL to Breakeven, stop here.
      if(!tr.beDone){
        tr.sl=tr.entry; // exact BE
        tr.beDone=true;
        tr.trailing=true;
      }else{
        // Step 2: Post-activation — trail at 40% of total move from entry
        // Ratchet: SL only advances toward profit, never retreats
        const newSL=+(tr.entry-(tr.entry-price)*0.40).toFixed(2);
        if(newSL<tr.sl)tr.sl=newSL;
      }
    }
  }

  return tr;
}

function checkExit(t, price){
  const{dir,tp1,tp2,tp3,sl,p1Done,p2Done,p3Done,trailing}=t;
  // Partial close sizes: leave the bulk of position running.
  //   TP1: close 25% (75% live) - SL moves to entry+buffer
  //   TP2: close 25% (50% live) - SL locks at TP1
  //   TP3: close 35% (15% live) - tight trail targets TP4
  //   TP4: close 100% remaining
  // Old 40/40/50 splits killed runners by TP3.

  if(dir==="BUY"){
    if(!p1Done&&price>=tp1)return{result:"TP1",exitPrice:tp1,partial:true,pct:0.25};
    if(p1Done&&!p2Done&&price>=tp2)return{result:"TP2",exitPrice:tp2,partial:true,pct:0.25};
    if(p2Done&&!p3Done&&price>=tp3)return{result:"TP3🏆",exitPrice:tp3,partial:true,pct:0.35};
    if(p3Done&&price>=tp3*1.005)return{result:"TP4🚀",exitPrice:price,partial:false,pct:1.0};
    if(price<=sl)return{result:trailing?"TRAIL":"SL",exitPrice:sl,partial:false,pct:1.0};
  }else{
    if(!p1Done&&price<=tp1)return{result:"TP1",exitPrice:tp1,partial:true,pct:0.25};
    if(p1Done&&!p2Done&&price<=tp2)return{result:"TP2",exitPrice:tp2,partial:true,pct:0.25};
    if(p2Done&&!p3Done&&price<=tp3)return{result:"TP3🏆",exitPrice:tp3,partial:true,pct:0.35};
    if(p3Done&&price<=tp3*0.995)return{result:"TP4🚀",exitPrice:price,partial:false,pct:1.0};
    if(price>=sl)return{result:trailing?"TRAIL":"SL",exitPrice:sl,partial:false,pct:1.0};
  }
  return null;
}

// News fetch — retries once after 30s if result is empty (handles transient CDN failures)
async function fetchNews(){
  async function attempt(){
    try{
      const r=await fetchWithTimeout("https://cdn-nfs.faireconomy.media/ff_calendar_thisweek.json",5000);
      if(!r.ok)throw 0;const d=await r.json();
      return d.filter(e=>(e.country==="USD"||(e.title||"").toLowerCase().includes("gold"))&&(e.impact==="High"||e.impact==="Medium"))
        .map(e=>({title:e.title,date:e.date,impact:e.impact,forecast:e.forecast,actual:e.actual,
          dir:e.actual&&e.forecast?(parseFloat(e.actual)>parseFloat(e.forecast)?"SELL":"BUY"):null}));
    }catch{return null;}
  }
  const first=await attempt();
  if(first&&first.length>0)return first;
  // Retry once after 30s — handles transient network/CDN failures at boot
  await new Promise(r=>setTimeout(r,30000));
  return(await attempt())||[];
}

// ── roundRect polyfill (canvas helper) ──────────────────────────────
function rrect(ctx,x,y,w,h,r){
  ctx.beginPath();
  ctx.moveTo(x+r,y);ctx.lineTo(x+w-r,y);ctx.quadraticCurveTo(x+w,y,x+w,y+r);
  ctx.lineTo(x+w,y+h-r);ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);
  ctx.lineTo(x+r,y+h);ctx.quadraticCurveTo(x,y+h,x,y+h-r);
  ctx.lineTo(x,y+r);ctx.quadraticCurveTo(x,y,x+r,y);
  ctx.closePath();
}

// ══════════════════════════════════════════════════════════════════
//  CHART — Canvas + requestAnimationFrame (MT5-style real-time)
//  Reads live data directly from rLiveCandles ref — zero React
//  re-renders during live trading. Smooth 60fps updates via RAF.
//  Falls back to `candles` prop for backtest / sim mode.
// ══════════════════════════════════════════════════════════════════
function Chart({candles,trade,livePrice,height=320,replayIdx=null,rLiveCandles=null}){
  const containerRef=useRef(null);
  const canvasRef=useRef(null);
  const rafRef=useRef(null);
  const scrollRef=useRef(0);      // candles scrolled from right edge (0=auto-right)
  const autoScrollRef=useRef(true);
  const touchXRef=useRef(0);
  const draggingRef=useRef(false);
  // Keep refs in sync with props (for RAF loop to read latest values)
  const candlesRef=useRef(candles);
  const tradeRef=useRef(trade);
  const lpRef=useRef(livePrice);
  useEffect(()=>{candlesRef.current=candles; canvasRef.current?.__markDirty?.();},[candles]);
  useEffect(()=>{tradeRef.current=trade; canvasRef.current?.__markDirty?.();},[trade]);
  useEffect(()=>{lpRef.current=livePrice; canvasRef.current?.__markDirty?.();},[livePrice]);

  const CW=9,BW=6,LW=0,RW=58; // candle width, body width, ZERO left margin (flush), right axis panel

  useEffect(()=>{
    const canvas=canvasRef.current;
    const container=containerRef.current;
    if(!canvas||!container)return;

    // ── Resize canvas to match container (DPR-aware for crisp rendering) ──
    let W=container.clientWidth, H=container.clientHeight||height;
    let _rzTimer;
    let _dirty=true; // declared here so resize() can set it safely
    const resize=()=>{
      const dpr=window.devicePixelRatio||1;
      W=container.clientWidth;
      H=container.clientHeight||height;
      canvas.width=W*dpr; canvas.height=H*dpr;
      canvas.style.width=W+'px'; canvas.style.height=H+'px';
      _dirty=true;
    };
    resize();
    // Debounce resize — avoids cascade redraws on window drag
    const ro=new ResizeObserver(()=>{clearTimeout(_rzTimer);_rzTimer=setTimeout(resize,40);}); ro.observe(container);

    // ── Touch / wheel scroll ──
    const onTS=e=>{draggingRef.current=true;autoScrollRef.current=false;touchXRef.current=e.touches[0].clientX;};
    const onTM=e=>{
      if(!draggingRef.current)return;
      const dx=e.touches[0].clientX-touchXRef.current;
      touchXRef.current=e.touches[0].clientX;
      const src2=(rLiveCandles&&rLiveCandles.current&&rLiveCandles.current.length>0)?rLiveCandles.current:candlesRef.current;
      const maxScroll=Math.max(0,(src2.length||400)-10);
      scrollRef.current=Math.max(0,Math.min(maxScroll,scrollRef.current+dx/CW));
      _dirty=true;
    };
    const onTE=()=>{draggingRef.current=false;if(scrollRef.current<0.5){autoScrollRef.current=true;scrollRef.current=0;}};
    const onWh=e=>{
      const src3=(rLiveCandles&&rLiveCandles.current&&rLiveCandles.current.length>0)?rLiveCandles.current:candlesRef.current;
      const maxScroll3=Math.max(0,(src3.length||400)-10);
      scrollRef.current=Math.max(0,Math.min(maxScroll3,scrollRef.current+e.deltaX/CW));
      autoScrollRef.current=scrollRef.current<0.5;
      _dirty=true;
    };
    canvas.addEventListener('touchstart',onTS,{passive:true});
    canvas.addEventListener('touchmove',onTM,{passive:true});
    canvas.addEventListener('touchend',onTE,{passive:true});
    canvas.addEventListener('wheel',onWh,{passive:true});

    // ── Colour constants ──
    const GRN='#22c55e',RED='#ef4444',BDR='#1e293b',DM='#475569';
    const GLD='#f59e0b',LIV='#38bdf8',BG='#0a0a0e';

    // ══ MT5-SPEED RAF LOOP ════════════════════════════════════════
    // ▸ Cached context (getContext per-frame = expensive GPU sync)
    // ▸ desynchronized:true = compositor thread decoupled = zero stall
    // ▸ alpha:false        = skip compositing alpha channel
    // ▸ Dirty flag         = skip draw when nothing changed
    // ▸ Live mode          = NEVER skip frames (tick arrives < 1s on XAUUSD)
    // ▸ Backtest mode      = skip if dirty===false AND < 16ms since last draw
    const _ctx2d = canvas.getContext('2d', {alpha:false, desynchronized:true});
    let _lastDrawTs = 0;
    canvas.__markDirty = () => { _dirty = true; };

    function draw(ts){
      const isLive = rLiveCandles && rLiveCandles.current && rLiveCandles.current.length > 0;
      // In live mode: ALWAYS draw every frame (ticks arrive < 200ms on XAU) — never skip
      // In backtest/sim mode: skip if nothing changed AND < 16ms since last draw
      if (!isLive && !_dirty && ts - _lastDrawTs < 16) {
        rafRef.current = requestAnimationFrame(draw); return;
      }
      _dirty = false; _lastDrawTs = ts;
      const dpr=window.devicePixelRatio||1;
      W=container.clientWidth;
      const ctx=_ctx2d;
      ctx.setTransform(dpr,0,0,dpr,0,0);

      // Pick data source: live ref (live mode) or prop (backtest/sim)
      const src=(rLiveCandles&&rLiveCandles.current&&rLiveCandles.current.length>0)
        ?rLiveCandles.current : candlesRef.current;
      const allVis=src.slice(-5000); // show up to 5000 candles for scrollback
      const lp=lpRef.current||0;
      const tr=tradeRef.current;

      ctx.fillStyle=BG; ctx.fillRect(0,0,W,H);

      if(allVis.length<1){
        ctx.fillStyle=DM;ctx.font='11px monospace';
        ctx.textAlign='center';
        ctx.fillText('Waiting for candle data...',W/2,H/2);
        rafRef.current=requestAnimationFrame(draw); return;
      }

      if(autoScrollRef.current) scrollRef.current=0;

      const pad={t:12,b:24,l:LW,r:RW};
      const chartW=W-pad.l-pad.r;

      // ── MT5-style rendering ──────────────────────────────────────
      // The right edge of the candle area is always fixed at W-pad.r.
      // scrollRef = how many candle-widths the view is shifted left from the live edge.
      // rightGapCandles = empty space to the right of the latest visible candle.
      // Latest candle always renders at the same x position; scrolling adds
      // candles to the right of the view (older candles appear to the left).
      const rightGapCandles=Math.max(3,Math.floor(chartW*0.15/CW));
      // Total candle slots visible in chart area
      const totalSlots=Math.floor(chartW/CW);
      // The "anchor" slot index (0-based from left) where the latest candle sits
      // = totalSlots - rightGapCandles - 1  (leave rightGap empty to the right)
      const anchorSlot=totalSlots-rightGapCandles-1;

      const scrolled=Math.floor(scrollRef.current);
      // endIdx: which allVis index is the latest candle shown
      // (scrolled=0 → latest candle; scrolled=N → N candles back from latest)
      const endIdx=Math.max(0,allVis.length-scrolled);
      // How many candles fit to the left of the anchor slot
      const startIdx=Math.max(0,endIdx-(anchorSlot+1));
      const vis=allVis.slice(startIdx,endIdx);

      // px maps vis-array index i to canvas x, anchored so that
      // the last element in vis lands on the anchor slot.
      // slot of vis[i] = anchorSlot - (vis.length-1-i)
      const px=i=>pad.l+(anchorSlot-(vis.length-1-i)+0.5)*CW;

      // ── Price range — include trade lines so they never push candles off screen ──
      const pp=[];
      vis.forEach(c=>{pp.push(c.high,c.low);});
      if(lp>0)pp.push(lp);
      // Only include trade lines in range if they're within 3× candle range
      const candLo=vis.length?Math.min(...vis.map(c=>c.low)):0;
      const candHi=vis.length?Math.max(...vis.map(c=>c.high)):0;
      const candRng=Math.max(candHi-candLo,1);
      if(tr){[tr.entry,tr.sl,tr.tp1,tr.tp2,tr.tp3].forEach(v=>{
        if(v!=null&&v>candLo-candRng*3&&v<candHi+candRng*3)pp.push(v);
      });}
      if(!pp.length){rafRef.current=requestAnimationFrame(draw);return;}
      const rawLo=Math.min(...pp),rawHi=Math.max(...pp);
      const mgn=Math.max((rawHi-rawLo)*0.12,1.5);
      const lo=rawLo-mgn,hi=rawHi+mgn,rng=hi-lo||1;
      const py=p=>pad.t+((hi-p)/rng)*(H-pad.t-pad.b);
      const pyC=p=>Math.max(pad.t+1,Math.min(H-pad.b-1,py(p)));

      // ── Right axis background panel (MT5-style, flush fill) ──
      ctx.fillStyle='#0d0d11';
      ctx.fillRect(W-pad.r,0,pad.r,H);
      ctx.strokeStyle=BDR;ctx.lineWidth=1;ctx.globalAlpha=0.7;
      ctx.beginPath();ctx.moveTo(W-pad.r,pad.t);ctx.lineTo(W-pad.r,H-pad.b);ctx.stroke();
      ctx.globalAlpha=1;

      // ── Grid lines + RIGHT axis price labels (MT5-style, full-width filled rectangles) ──
      const rawStep=(hi-lo)/6;
      const mag=Math.pow(10,Math.floor(Math.log10(rawStep)));
      const step=Math.ceil(rawStep/mag)*mag||1;
      ctx.font='bold 7.5px "JetBrains Mono",monospace';
      for(let p=Math.ceil(lo/step)*step;p<=hi;p=+(p+step).toFixed(2)){
        const y=py(p);if(y<pad.t-2||y>H-pad.b+2)continue;
        // Horizontal grid line (chart area only)
        ctx.strokeStyle=BDR;ctx.lineWidth=0.5;ctx.globalAlpha=0.5;
        ctx.beginPath();ctx.moveTo(pad.l,y);ctx.lineTo(W-pad.r,y);ctx.stroke();
        ctx.globalAlpha=1;
        // Right-axis price label — full-width filled rectangle, no gaps
        ctx.fillStyle='#181820';
        ctx.fillRect(W-pad.r+1, y-7, pad.r-1, 14);
        ctx.fillStyle='#6b7280';
        ctx.textAlign='center';
        ctx.fillText(p.toFixed(2), W-pad.r+pad.r/2, y+2.8);
      }

      // ── Day boundaries ──
      const dayBounds=[];
      for(let i=1;i<vis.length;i++){
        if(vis[i]?.ts&&vis[i-1]?.ts&&new Date(vis[i-1].ts).getUTCDate()!==new Date(vis[i].ts).getUTCDate())
          dayBounds.push(i);
      }
      if(dayBounds.length>0){
        const lb=dayBounds[dayBounds.length-1];
        const x2=px(lb)-CW*0.5;
        ctx.fillStyle='#ffffff08';ctx.fillRect(pad.l,pad.t,Math.max(0,x2-pad.l),H-pad.t-pad.b);
        ctx.fillStyle='#60a5fa04';ctx.fillRect(x2,pad.t,Math.max(0,W-pad.r-x2),H-pad.t-pad.b);
      }
      ctx.setLineDash([4,4]);
      dayBounds.forEach(i=>{
        const x=px(i)-CW*0.5;
        ctx.strokeStyle=GLD;ctx.lineWidth=1;ctx.globalAlpha=0.4;
        ctx.beginPath();ctx.moveTo(x,pad.t);ctx.lineTo(x,H-pad.b);ctx.stroke();
        ctx.globalAlpha=1;
        if(vis[i]?.ts){
          const lbl=new Date(vis[i].ts).toLocaleDateString('en-US',{month:'short',day:'numeric'});
          ctx.font='7.5px "JetBrains Mono",monospace';ctx.textAlign='left';
          ctx.fillStyle=GLD+'b0';ctx.fillText(lbl,x+3,pad.t+10);
        }
      });
      ctx.setLineDash([]);

      // ── Trade lines — thin dashed, labels on right axis only, full-width fills ──
      const tLine=(price,col,lbl,dashed)=>{
        if(price==null)return;
        const yRaw=py(price),clamped=yRaw<pad.t+1||yRaw>H-pad.b-1;
        const y=pyC(price),arr=clamped?(yRaw<pad.t+1?'▲':'▼'):'';
        // Draw a thin dashed line across chart area only
        ctx.strokeStyle=col;ctx.lineWidth=clamped?0.6:0.9;
        ctx.globalAlpha=clamped?0.25:0.55;
        ctx.setLineDash(dashed?[5,4]:[3,3]);
        ctx.beginPath();ctx.moveTo(pad.l,y);ctx.lineTo(W-pad.r,y);ctx.stroke();
        ctx.setLineDash([]);ctx.globalAlpha=1;
        // Right-axis label — full width, no gaps
        ctx.fillStyle=col;ctx.globalAlpha=clamped?0.60:0.92;
        ctx.fillRect(W-pad.r+1,y-7,pad.r-1,14);
        ctx.globalAlpha=1;
        ctx.fillStyle='#000';ctx.font='bold 6.5px "JetBrains Mono",monospace';
        ctx.textAlign='center';
        const shortLbl=lbl.replace('✓','');
        ctx.fillText(`${shortLbl}${arr} ${(+price).toFixed(2)}`,W-pad.r+pad.r/2,y+2.5);
      };
      if(tr){
        tLine(tr.tp3,'#81C784',tr.p3Done?'TP3✓':'TP3',true);
        tLine(tr.tp2,'#4CAF50',tr.p2Done?'TP2✓':'TP2',true);
        tLine(tr.tp1,'#2E7D32',tr.p1Done?'TP1✓':'TP1',true);
        tLine(tr.sl,tr.trailing?'#FFC107':'#FF3B30',tr.trailing?'TRAIL':'SL',false);
        tLine(tr.entry,tr.dir==='BUY'?'#2196F3':'#F44336',tr.dir==='BUY'?'BUY':'SELL',false);
      }

      // ── Candles — clip only at right axis boundary (MT5 scroll behaviour) ──
      vis.forEach((c,i)=>{
        const x=px(i);
        // Only skip if candle is fully right of the price axis OR body center is right of it
        if(x-BW/2>=W-pad.r) return;
        // Allow left overflow — candles vanish off left edge naturally
        const bull=c.bull!==undefined?c.bull:c.close>=c.open;
        const col=bull?GRN:RED,isLive=c.forming===true;
        // Clamp all y values strictly within chart area
        const yH=Math.max(pad.t,py(c.high));
        const yL=Math.min(H-pad.b,py(c.low));
        const yO=Math.max(pad.t,Math.min(H-pad.b,py(c.open)));
        const yC2=Math.max(pad.t,Math.min(H-pad.b,py(c.close)));
        const bTop=Math.min(yO,yC2),bH=Math.max(Math.abs(yO-yC2),1.5);
        ctx.globalAlpha=isLive?0.65:0.95;
        // Wick — clipped to chart area
        ctx.strokeStyle=col;ctx.lineWidth=1.2;ctx.setLineDash([]);
        ctx.beginPath();ctx.moveTo(x,Math.max(pad.t,yH));ctx.lineTo(x,Math.min(H-pad.b,yL));ctx.stroke();
        // Body — fully filled: bull=green, bear=red
        ctx.fillStyle=isLive?col+'88':col;
        ctx.fillRect(x-BW/2,Math.max(pad.t,bTop),BW,Math.min(bH,H-pad.b-Math.max(pad.t,bTop)));
        if(isLive){ctx.strokeStyle=col;ctx.lineWidth=0.8;ctx.strokeRect(x-BW/2,Math.max(pad.t,bTop),BW,Math.min(bH,H-pad.b-Math.max(pad.t,bTop)));}
        // Live forming bar indicator
        if(isLive){
          ctx.globalAlpha=0.25;ctx.strokeStyle=col;ctx.lineWidth=0.5;
          ctx.setLineDash([2,6]);
          ctx.beginPath();ctx.moveTo(x,pad.t);ctx.lineTo(x,H-pad.b);ctx.stroke();
          ctx.setLineDash([]);
        }
        ctx.globalAlpha=1;
      });

      // ── Current price tag — full-width fill like MT5 ──
      const last=vis[vis.length-1];
      if(last){
        const lastY=pyC(last.close),lastCol=last.bull?GRN:RED;
        ctx.strokeStyle=lastCol;ctx.lineWidth=0.8;ctx.globalAlpha=0.55;
        ctx.setLineDash([2,3]);
        ctx.beginPath();ctx.moveTo(pad.l,lastY);ctx.lineTo(W-pad.r,lastY);ctx.stroke();
        ctx.setLineDash([]);ctx.globalAlpha=1;
        ctx.fillStyle=lastCol;
        ctx.fillRect(W-pad.r+1,lastY-8,pad.r-1,16);
        ctx.fillStyle='#000';ctx.font='bold 7px "JetBrains Mono",monospace';
        ctx.textAlign='center';ctx.fillText(last.close.toFixed(2),W-pad.r+pad.r/2,lastY+2.5);
      }

      // ── Live price tag (if different from last close) — full-width fill ──
      if(lp>0&&last&&Math.abs(lp-last.close)>0.01){
        const ly=pyC(lp);
        ctx.strokeStyle=LIV;ctx.lineWidth=1;ctx.globalAlpha=0.85;
        ctx.setLineDash([2,2]);
        ctx.beginPath();ctx.moveTo(pad.l,ly);ctx.lineTo(W-pad.r,ly);ctx.stroke();
        ctx.setLineDash([]);ctx.globalAlpha=1;
        ctx.fillStyle=LIV;
        ctx.fillRect(W-pad.r+1,ly-8,pad.r-1,16);
        ctx.fillStyle='#000';ctx.font='bold 7px "JetBrains Mono",monospace';
        ctx.textAlign='center';ctx.fillText(lp.toFixed(2),W-pad.r+pad.r/2,ly+2.5);
      }

      rafRef.current=requestAnimationFrame(draw);
    }

    rafRef.current=requestAnimationFrame(draw);
    return()=>{
      cancelAnimationFrame(rafRef.current);ro.disconnect();
      canvas.removeEventListener('touchstart',onTS);
      canvas.removeEventListener('touchmove',onTM);
      canvas.removeEventListener('touchend',onTE);
      canvas.removeEventListener('wheel',onWh);
    };
  },[]); // empty deps — RAF reads from refs, never re-subscribes

  // Header needs livePrice from state for the live indicator
  const last=candles[candles.length-1];
  const atr=calcATR(candles.length>1?candles:[]);
  const vis0=candles[0];
  const visN=candles[candles.length-1];

  return(
    <div style={{borderRadius:"10px",border:`1px solid ${BORDER}`,overflow:"hidden",background:"#0a0a0e",display:"flex",flexDirection:"column",height:"100%"}}>
      {/* Header */}
      <div style={{display:"flex",gap:"8px",padding:"5px 10px",borderBottom:`1px solid ${BORDER}22`,
        alignItems:"center",flexShrink:0,background:"#0c0c10"}}>
        <span style={{fontSize:"8px",color:GREEN,fontFamily:"'JetBrains Mono',monospace",fontWeight:"700"}}>● BULL</span>
        <span style={{fontSize:"8px",color:RED,fontFamily:"'JetBrains Mono',monospace",fontWeight:"700"}}>● BEAR</span>
        {livePrice>0&&<span style={{fontSize:"8px",color:LIVE_COL,fontFamily:"'JetBrains Mono',monospace",
          fontWeight:"700",animation:"blink 0.8s infinite",letterSpacing:"-0.3px"}}>
          ● LIVE {livePrice.toFixed(2)}</span>}
        <span style={{marginLeft:"auto",fontSize:"8px",color:DIM,fontFamily:"'JetBrains Mono',monospace"}}>
          {candles.length} bars · ←drag→
        </span>
      </div>
      {/* Canvas — fills all available space */}
      <div ref={containerRef} style={{flex:1,minHeight:0,position:"relative",touchAction:"none"}}>
        <canvas ref={canvasRef} style={{display:"block",position:"absolute",top:0,left:0,touchAction:"none"}}/>
      </div>
      {/* Footer */}
      <div style={{display:"flex",gap:"8px",padding:"3px 10px",borderTop:`1px solid ${BORDER}22`,
        flexWrap:"wrap",background:"#080809",flexShrink:0}}>
        {vis0?.ts&&<span style={{fontSize:"8px",color:DIM,fontFamily:"'JetBrains Mono',monospace"}}>
          {fmtDateShort(vis0.ts)} → {fmtDateShort(visN.ts)}
        </span>}
        <span style={{fontSize:"8px",color:DIM,fontFamily:"'JetBrains Mono',monospace",marginLeft:"auto"}}>
          ATR {Math.max(+atr||0.50,0.50).toFixed(2)}
        </span>
      </div>
    </div>
  );
}

// ── Memoize Chart to skip re-renders when parent state changes unrelated to chart ──
const MemoChart=React.memo(Chart);

// ── ChartFill: fills its flex parent and passes measured height into Chart ──
function ChartFill(props){
  const wrapRef=useRef(null);
  const [h,setH]=useState(320);
  useEffect(()=>{
    if(!wrapRef.current)return;
    const ro=new ResizeObserver(entries=>{
      for(const e of entries){const ch=Math.floor(e.contentRect.height);if(ch>50)setH(ch);}
    });
    ro.observe(wrapRef.current);
    // Initial measure
    const initial=wrapRef.current.clientHeight;
    if(initial>50)setH(initial);
    return()=>ro.disconnect();
  },[]);
  return(
    <div ref={wrapRef} style={{flex:1,minHeight:0,height:"100%"}}>
      <MemoChart {...props} height={h}/>
    </div>
  );
}

// ── EQUITY CURVE ───────────────────────────────────────────────────
const EquityCurve=React.memo(function EquityCurve({hist,startBal}){
  if(!hist||hist.length<2)return(
    <div style={{height:"60px",display:"flex",alignItems:"center",justifyContent:"center",fontSize:"9px",color:DIM}}>Building equity curve…</div>
  );
  const W=680,H=60,lo=Math.min(...hist,startBal-1),hi=Math.max(...hist,startBal+1),rng=hi-lo||1;
  const pts=hist.map((v,i)=>`${(i/(hist.length-1))*W},${H-4-((v-lo)/rng*(H-12)+4)}`).join(" ");
  const col=hist[hist.length-1]>=startBal?GREEN:RED;
  const lastY=H-4-((hist[hist.length-1]-lo)/rng*(H-12)+4);
  const startY=H-4-((startBal-lo)/rng*(H-12)+4);
  return(
    <div style={{background:"#0a0a0e",borderRadius:"6px",overflow:"hidden",border:`1px solid ${BORDER}`}}>
      <svg viewBox={`0 0 ${W} ${H}`} style={{width:"100%",display:"block"}} preserveAspectRatio="none">
        <defs><linearGradient id="eqg" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stopColor={col} stopOpacity="0.20"/>
          <stop offset="100%" stopColor={col} stopOpacity="0.01"/>
        </linearGradient></defs>
        <line x1="0" x2={W} y1={startY} y2={startY} stroke={DIM} strokeWidth="0.6" strokeDasharray="4,3" opacity="0.5"/>
        <polygon points={`0,${H} ${pts} ${W},${H}`} fill="url(#eqg)"/>
        <polyline points={pts} fill="none" stroke={col} strokeWidth="1.8"/>
        <circle cx={W} cy={lastY} r="3.5" fill={col}/>
      </svg>
    </div>
  );
});

function StrengthBar({pct}){
  const col=pct>=90?GOLD:pct>=70?GREEN:pct>=50?BLUE:MUTED;
  return(
    <div style={{display:"flex",alignItems:"center",gap:"6px"}}>
      <div style={{flex:1,height:"4px",background:"#1a1a1a",borderRadius:"2px",overflow:"hidden"}}>
        <div style={{height:"100%",width:`${pct}%`,background:col,transition:"width .4s",borderRadius:"2px"}}/>
      </div>
      <span style={{fontSize:"9px",fontWeight:"700",color:col,fontFamily:"'JetBrains Mono',monospace",minWidth:"28px",textAlign:"right"}}>{pct}%</span>
    </div>
  );
}

function VoteBar({buyVotes,sellVotes}){
  const total=buyVotes+sellVotes||1;
  const dir=buyVotes>=sellVotes?"BUY":"SELL";
  const score=Math.max(buyVotes,sellVotes);
  const col=dir==="BUY"?GREEN:RED;
  return(
    <div style={{display:"flex",alignItems:"center",gap:"4px",flexShrink:0}}>
      <span style={{fontSize:"8px",color:col,fontFamily:"'JetBrains Mono',monospace",fontWeight:"700",whiteSpace:"nowrap"}}>
        {dir} {score}/16
      </span>
      <span style={{fontSize:"10px",color:col,fontWeight:"700",lineHeight:1}}>→</span>
    </div>
  );
}

function MTFBadge({bias}){
  if(bias===0)return<span style={{fontSize:"8px",color:DIM,padding:"1px 5px",background:"#111",borderRadius:"3px",fontFamily:"'JetBrains Mono',monospace"}}>HTF neutral</span>;
  const col=bias>0?GREEN:RED,label=bias>0?"HTF BULL ↑":"HTF BEAR ↓";
  return<span style={{fontSize:"8px",color:col,padding:"1px 5px",background:col+"15",border:`1px solid ${col}30`,borderRadius:"3px",fontWeight:"700",fontFamily:"'JetBrains Mono',monospace"}}>{label}</span>;
}

function SpreadPill({spread,inst}){
  const limit=SPREAD_LIMITS["XAUUSD"]??MAX_SPREAD; // 1.20 for Exness Zero XAU/USD
  // ok = under limit (normal), wide = 1x–2x limit, bad = over 2x limit
  const wide=spread>limit&&spread<=limit*2;
  const bad=spread>limit*2;
  const col=bad?RED:wide?GOLD:GREEN;
  const lbl=bad?"BAD":wide?"WIDE":"SPD";
  return(
    <div style={{padding:"2px 7px",borderRadius:"10px",fontSize:"8px",fontFamily:"'JetBrains Mono',monospace",
      background:col+"15",border:`1px solid ${col}30`,color:col}}>
      {lbl} {(+spread||0).toFixed(2)}
    </div>
  );
}

function HeartbeatDot({lastFetchTime}){
  const age=lastFetchTime?Math.floor((Date.now()-lastFetchTime)/1000):999;
  const ok=age<20,warn=age<45,col=ok?GREEN:warn?GOLD:RED;
  return<div style={{width:"7px",height:"7px",borderRadius:"50%",background:col,flexShrink:0,animation:ok?"pulse 2s infinite":"none"}}/>;
}

function LockToast({amount,onDone}){
  useEffect(()=>{const t=setTimeout(onDone,5000);return()=>clearTimeout(t);},[]);
  const released=+(amount*0.10).toFixed(2);
  const locked=+(amount*0.90).toFixed(2);
  return(
    <div style={{position:"fixed",top:"80px",left:"50%",transform:"translateX(-50%)",zIndex:200,

// ══════════════════════════════════════════════════════════════════
//  updateLiveCandle — pure helper (defined OUTSIDE App, no closures)
//  Updates the last forming candle in-place, or appends a new one.
// ══════════════════════════════════════════════════════════════════
function updateLiveCandle(prevCandles, price, ts){
  if(!prevCandles.length)return prevCandles;
  const last=prevCandles[prevCandles.length-1];
  const minute=Math.floor(ts/60000)*60000;

  // SAME minute AND last candle is the forming bar → update in place
  if(last.forming===true && last.ts===minute){
    return[
      ...prevCandles.slice(0,-1),
      {...last,high:Math.max(last.high,price),low:Math.min(last.low,price),
       close:price,bull:price>=last.open,body:Math.abs(price-last.open),
       range:Math.max(last.high,price)-Math.min(last.low,price),forming:true},
    ];
  }

  // Last candle is a CLOSED historical bar (forming:false/undefined):
  // Always open a fresh forming bar — never mutate history
  if(!last.forming){
    const newBar={ts:minute,open:price,high:price,low:price,close:price,
      vol:0,bull:true,body:0,range:0,forming:true};
    return[...prevCandles,newBar];
  }

  // Last candle IS forming but minute has rolled → close it, open new one
  const closedPrev={...last,forming:false,bull:last.close>=last.open,
    body:Math.abs(last.close-last.open),range:last.high-last.low};
  const newCandle={ts:minute,open:last.close,high:price,low:price,close:price,
    vol:0,bull:price>=last.close,body:0,range:0,forming:true};
  return[...prevCandles.slice(0,-1),closedPrev,newCandle];
}

    setStreak({cur:0,dir:""});setSessionSecs(0);setEquityHist([nb]);
    setSessPnl({london:0,ny:0,tokyo:0});setLockedProfits(0);setLastSignalVotes(null);
    if(!keepCandles){setCandles([]);}
  }

  // ── CORE TRADE PROCESSOR (shared by all modes) ──────────────────
  function processCandle(candle,spreadOverride){
    _currentInst=rInstrument.current; // keep global in sync for inDead / masterSignal
    const newC=[...rCandles.current,candle].slice(-800);
    rCandles.current=newC;
    const price=candle.close;
    const hour=candle.ts?new Date(candle.ts).getUTCHours()+(new Date(candle.ts).getUTCMinutes()/60):nowGMT();
    const spread=spreadOverride!=null?spreadOverride:rSpread.current;
    const atr=calcATR(newC);
    rCachedATR.current=+atr.toFixed(2);// keep cache fresh for tick handler
    const currentATR=+atr.toFixed(2);
    // ATR display throttled — updates every 5 candles is plenty for the UI
    if(!rTickN.current||rTickN.current%5===0) setLiveATR(+currentATR.toFixed(2));
    // ── SETE v2: decay strategy weights every 10 candles ─────────────
    if((rCandles.current.length%10)===0) decayWeights();
    // ── ROLLING AVG ATR (50 samples, reused for regime detection) ────
    const avgATR=calcAvgATR(newC,20,50);

    // Update Asian candles
    if(inAsian(hour))rAsianC.current=[...rAsianC.current,candle].slice(-200);

    // Day roll
    const isNewDay=candle.ts&&(new Date(candle.ts).getUTCHours()===0&&new Date(candle.ts).getUTCMinutes()<2);
    if(isNewDay){
      rDayStart.current=rBalance.current;rDayTrades.current=0;setDayTrades(0);
      rOrbSet.current=false;rOrb.current=null;setOrbRange(null);
      const l24=newC.slice(-1440);
      rKLevels.current={pdh:Math.max(...l24.map(x=>x.high)),pdl:Math.min(...l24.map(x=>x.low)),
        asianH:rAsianC.current.length?Math.max(...rAsianC.current.map(x=>x.high)):null,
        asianL:rAsianC.current.length?Math.min(...rAsianC.current.map(x=>x.low)):null};
      setKLevels({...rKLevels.current});rAsianC.current=[];
    }

    // ORB
    if(hour>=13.5&&hour<14&&!rOrbSet.current&&newC.length>=5){
      const l5=newC.slice(-5);
      const orb={high:+Math.max(...l5.map(x=>x.high)).toFixed(2),low:+Math.min(...l5.map(x=>x.low)).toFixed(2)};
      rOrb.current=orb;rOrbSet.current=true;setOrbRange(orb);
    }
    if(hour>=0&&hour<13.4&&rOrbSet.current){rOrbSet.current=false;rOrb.current=null;setOrbRange(null);}

    const dayLossHit=(rBalance.current-rDayStart.current)<-(rDayStart.current*rMaxLoss.current/100);

    // Fakeout detection
    if(newC.length>=9){
      const pv6H=Math.max(...newC.slice(-8,-1).map(x=>x.high)),pv6L=Math.min(...newC.slice(-8,-1).map(x=>x.low));
      if(candle.high>pv6H&&candle.close<pv6H-(candle.high-pv6H)*0.28)rFakeLog.current.push({level:pv6H,dir:"BUY",t:Date.now()});
      if(candle.low<pv6L&&candle.close>pv6L+(pv6L-candle.low)*0.28)rFakeLog.current.push({level:pv6L,dir:"SELL",t:Date.now()});
      rFakeLog.current=rFakeLog.current.filter(f=>Date.now()-f.t<18*60*1000);
    }

    // Manage open trade
    if(rTrade.current){
      rTrade.current=manageTrade(rTrade.current,price,atr,rLiveProvider.current,10);
      const exit=checkExit(rTrade.current,price);
      if(exit){
        // (partial / full exit handling follows below)
        const t=rTrade.current,pip=10;
        if(exit.partial){
          const cl=+(t.lots*exit.pct).toFixed(4);
          const pnl=t.dir==="BUY"?+((exit.exitPrice-t.entry)*pip*cl).toFixed(2):+((t.entry-exit.exitPrice)*pip*cl).toFixed(2);
          // Lock SL at TP level — but NEVER below the current trailing SL (ratchet protection)
          const rawLockSL=exit.result==="TP1"?t.entry:exit.result==="TP2"?t.tp1:exit.result==="TP3🏆"?t.tp2:t.sl;
          const newSL=t.dir==="BUY"?Math.max(rawLockSL,t.sl):Math.min(rawLockSL,t.sl);
          const upd={...t,lots:+(t.lots*(1-exit.pct)).toFixed(4),
            p1Done:exit.result==="TP1"?true:t.p1Done,
            p2Done:exit.result==="TP2"?true:t.p2Done,
            p3Done:exit.result==="TP3🏆"?true:t.p3Done,
            sl:newSL,beDone:true,
            highWater:t.highWater,lowWater:t.lowWater};
          rTrade.current=upd;setTrade({...upd});
          rBalance.current=+(rBalance.current+pnl).toFixed(2);setBalance(rBalance.current);
          rPeakBal.current=Math.max(rPeakBal.current,rBalance.current);setPeakBal(rPeakBal.current);
          rStats.current={...rStats.current,pnl:+(rStats.current.pnl+pnl).toFixed(2)};setStats({...rStats.current});
          const emoji=exit.result==="TP3🏆"?"🏆":exit.result==="TP4🚀"?"🚀":"🎯";
          setStatus(`${emoji} ${exit.result} +$${pnl.toFixed(2)} · SL locked @ ${newSL.toFixed(2)}`);
          pushLog({won:true,result:exit.result,dir:t.dir,strength:t.strength,confirms:t.confirms,entry:t.entry,exitP:exit.exitPrice.toFixed(2),pnl,time:fmtTime(),ts:candle.ts,tradeMode:"PARTIAL"});
          checkProfitTarget();

          // ── ADD-ON POSITION AT TP1 (Feature 2) ──────────────────────
          // When TP1 fires: re-check signal. If strategies still agree in
          // the same direction AND no trade2 is already running, open a
          // fresh position using dynamic lot sizing with the same SL/trail
          // rules. Entry is the current TP1 price.

                cs:newC,dir:t.dir,entry:addEntry,atr,spread,

              const{lots:addLots}=calcHFTLots({

              const addTrade={
                ...addOnSig,

              };
              rTrade2.current=addTrade;setTrade2({...addTrade});
              rDayTrades.current+=1;setDayTrades(rDayTrades.current);
              pushLog({won:true,result:"ADD-ON",dir:t.dir,strength:addOnSig.strength,
                confirms:"Signal confirmed at TP1",entry:addEntry,exitP:"—",pnl:0,

              setStatus(`➕ ADD-ON ${t.dir} @ ${addEntry} · SL:${addSL.sl} · signal confirmed`);
              // Pyramid level 1 opened (level 0 = original trade)

          }
          // Reset pyramid tracking when TP2/3 hits or after add-on
          if(exit.result!=="TP1"){rPyramidLevel.current=0;rLastAddPrice.current=0;}

          if(rMode.current!=="forward")setCandles([...newC]);
          return;
        }else{
          const pnl=t.dir==="BUY"?+((exit.exitPrice-t.entry)*pip*t.lots).toFixed(2):+((t.entry-exit.exitPrice)*pip*t.lots).toFixed(2);
          const won=pnl>0;
          rBalance.current=+(rBalance.current+pnl).toFixed(2);
          rPeakBal.current=Math.max(rPeakBal.current,rBalance.current);setPeakBal(rPeakBal.current);
          // ── STRATEGY WEIGHT UPDATE on full close ──────────────────
          if(t.confirms){
            const mainStrat=(t.confirms.split(" · ")[0]||"").trim();
            if(mainStrat){
              const prev=rStratTable.current[mainStrat]||{w:0,l:0};
              rStratTable.current[mainStrat]=won?{w:prev.w+1,l:prev.l}:{w:prev.w,l:prev.l+1};
            }
          }
          // ── SETE v2: update strategy weights on full trade close ──────
          if(t.seteVotes&&t.seteVotes.length>0){
            updateSETEPerformance(t.seteVotes,won,t.seteRegime||"TRANSITION");
          }
          // Reset pyramid tracking after trade closes
          rPyramidLevel.current=0;rLastAddPrice.current=0;
          rEquityPeak.current=Math.max(rEquityPeak.current,rBalance.current);
          const prevStr=rStreak.current;
          rStreak.current=won?(prevStr.dir==="W"?{cur:prevStr.cur+1,dir:"W"}:{cur:1,dir:"W"}):(prevStr.dir==="L"?{cur:prevStr.cur+1,dir:"L"}:{cur:1,dir:"L"});
          setStreak(rStreak.current);
          const h=Math.floor(hour),hs=rHourStats.current[h]||{trades:0,wins:0};
          rHourStats.current[h]={trades:hs.trades+1,wins:hs.wins+(won?1:0)};setHourStats({...rHourStats.current});
          if(hour>=0&&hour<3)rSessPnl.current.tokyo=+(rSessPnl.current.tokyo+pnl).toFixed(2);
          else if(hour>=8&&hour<12)rSessPnl.current.london=+(rSessPnl.current.london+pnl).toFixed(2);
          else if(hour>=13&&hour<17)rSessPnl.current.ny=+(rSessPnl.current.ny+pnl).toFixed(2);
          setSessPnl({...rSessPnl.current});
          rStats.current={...rStats.current,w:rStats.current.w+(won?1:0),l:rStats.current.l+(won?0:1),
            pnl:+(rStats.current.pnl+pnl).toFixed(2),tp3:rStats.current.tp3+(exit.result==="TP3🏆"?1:0),total:rStats.current.total+1};
          setStats({...rStats.current});setBalance(rBalance.current);
          rTrade.current=null;setTrade(null);setPhase("SCANNING");
          rLastTradeTs.current=Date.now();
          rEquityH.current=[...rEquityH.current,rBalance.current].slice(-500);setEquityHist([...rEquityH.current]);
          const icon=exit.result==="TP3🏆"?"🏆":exit.result.startsWith("TP")?"✅":exit.result==="TRAIL"?"🎯":won?"✅":"❌";
          setLastResult({icon,text:`${exit.result} · ${t.dir} · ${won?"+":""}$${pnl.toFixed(2)}`,won});
          setTimeout(()=>setLastResult(null),4000);
          setStatus("⏳ Scanning — last: "+exit.result+" "+t.dir+" "+(won?"+":"")+"$"+pnl.toFixed(2));
          pushLog({won,result:exit.result,dir:t.dir,strength:t.strength,confirms:t.confirms,entry:t.entry,exitP:exit.exitPrice.toFixed(2),pnl,time:fmtTime(),ts:candle.ts,tradeMode:t.tradeMode});
          checkProfitTarget();
          if(rMode.current!=="forward")setCandles([...newC]);

        }
      }
      setTrade({...rTrade.current});setPhase("IN_TRADE");
      // ── PYRAMID ADD during trailing (HGE pyramiding system) ────────
      // Only if: trailing activated, no second position open, pyramid
      // level < MAX_PYRAMIDS, price moved ADD_STEP since last add, and
      // ATR regime allows it (expansion) with signal confirmation.
      const tr2=rTrade.current;
      if(tr2&&tr2.trailing&&!rTrade2.current&&rPyramidLevel.current<MAX_PYRAMIDS){
        const addStep=Math.max(atr*0.8, 1.0);
        const priceMoved=Math.abs(price-(rLastAddPrice.current||tr2.entry));
        if(priceMoved>=addStep){
          const pyrRegime=detectATRRegime(atr,avgATR);
          if(pyrRegime==="expansion"){
            const pyrSig=masterSignal({
              cs:newC,hour,kL:rKLevels.current,spread,orb:rOrb.current,

            if(pyrSig&&pyrSig.dir===tr2.dir&&pyrSig.score>=2){

              const{lots:pyrRaw}=calcHFTLots({
                balance:rBalance.current,dayStartBal:rDayStart.current,

              const pyrLots=+Math.min(Math.max(+pyrRaw.toFixed(4),MIN_LOT),MAX_LOT_NORMAL).toFixed(4);
              const pyrTrade={
                ...pyrSig,entry:pyrEntry,sl:pyrSL.sl,slD:pyrSL.slD,

                tp3:+(tr2.dir==="BUY"?pyrEntry+pyrSL.slD*6.0:pyrEntry-pyrSL.slD*6.0).toFixed(2),

              setStatus(`🔺 PYRAMID L${rPyramidLevel.current} ${tr2.dir} @ ${pyrEntry} · ${pyrLots} lots`);
            }
          }
        }
      }
    }
    // Manage second position if open
    if(rTrade2.current){
      rTrade2.current=manageTrade(rTrade2.current,price,atr,rLiveProvider.current,10);
      const exit2=checkExit(rTrade2.current,price);
      if(exit2){
        const t=rTrade2.current,pip=10;
        if(exit2.partial){
          const cl=+(t.lots*exit2.pct).toFixed(4);
          const pnl=t.dir==="BUY"?+((exit2.exitPrice-t.entry)*pip*cl).toFixed(2):+((t.entry-exit2.exitPrice)*pip*cl).toFixed(2);
          const rawLock2b=exit2.result==="TP1"?t.entry:exit2.result==="TP2"?t.tp1:exit2.result==="TP3🏆"?t.tp2:t.sl;
          const newSL2b=t.dir==="BUY"?Math.max(rawLock2b,t.sl):Math.min(rawLock2b,t.sl);
          rTrade2.current={...t,lots:+(t.lots*(1-exit2.pct)).toFixed(4),
            p1Done:exit2.result==="TP1"?true:t.p1Done,p2Done:exit2.result==="TP2"?true:t.p2Done,
            p3Done:exit2.result==="TP3🏆"?true:t.p3Done,

            beDone:true,highWater:t.highWater,lowWater:t.lowWater};
          setTrade2({...rTrade2.current});
          rBalance.current=+(rBalance.current+pnl).toFixed(2);setBalance(rBalance.current);
          rStats.current={...rStats.current,pnl:+(rStats.current.pnl+pnl).toFixed(2)};setStats({...rStats.current});
          pushLog({won:true,result:"P2-"+exit2.result,dir:t.dir,strength:t.strength,confirms:t.confirms,entry:t.entry,exitP:exit2.exitPrice.toFixed(2),pnl,time:fmtTime(),ts:candle.ts});
