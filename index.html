        }else{
          const pnl=t.dir==="BUY"?+((exit2.exitPrice-t.entry)*pip*t.lots).toFixed(2):+((t.entry-exit2.exitPrice)*pip*t.lots).toFixed(2);
          rBalance.current=+(rBalance.current+pnl).toFixed(2);setBalance(rBalance.current);
          rStats.current={...rStats.current,w:rStats.current.w+(pnl>0?1:0),l:rStats.current.l+(pnl>0?0:1),
            pnl:+(rStats.current.pnl+pnl).toFixed(2),total:rStats.current.total+1};
          setStats({...rStats.current});
          rTrade2.current=null;setTrade2(null);
          pushLog({won:pnl>0,result:"P2-"+exit2.result,dir:t.dir,strength:t.strength,confirms:t.confirms,entry:t.entry,exitP:exit2.exitPrice.toFixed(2),pnl,time:fmtTime(),ts:candle.ts});
          checkProfitTarget();
        }
      }else{
        setTrade2({...rTrade2.current});
      }
    }
    if(rTrade.current)return;// don't signal if pos1 still open

    if(dayLossHit){setPhase("STANDBY");setStatus("🛑 Daily loss limit — standing down");return;}
    if(isNewsBlackout(rNews.current)){setPhase("STANDBY");setStatus("📰 News blackout");return;}

    // ── MARKET STATE DETECTION ─────────────────────────────────────
    const mState=detectMarketState(newC);
    rMktState.current=mState;
    setMktState(mState);

    // ── POST-TARGET COOLDOWN ONLY — never blocks on fresh start ──────
    // rLastTradeTs is set to 0 on init/reset, so cooldown never fires at startup.
    // It only activates after checkProfitTarget() triggers a target lock.
    const cooldownMs=300000; // 5 min breather after target hit (was 2 min)
    const timeSinceTrade=rLastTradeTs.current===0?Infinity:Date.now()-rLastTradeTs.current;
    if(rAfterTarget.current&&timeSinceTrade<cooldownMs){
      setPhase("SCANNING");
      if(rTickN.current%6===0){
        const secsLeft=Math.ceil((cooldownMs-timeSinceTrade)/1000);

      }
      if(rMode.current!=="forward")setCandles([...newC]);
      return;
    }
    if(timeSinceTrade>=cooldownMs)rAfterTarget.current=false;// cooldown expired

    // ── PER-SESSION CIRCUIT BREAKER ─────────────────────────────────
    // Pause trading if current session has lost ≥10% of balance at session open.
    // This prevents a bad London session from bleeding into NY with a damaged account.
    const inLondon=hour>=8&&hour<12,inNY=hour>=13&&hour<17,inTokyo=hour>=0&&hour<3;
    if(inTokyo&&rSessBalAtOpen.current.tokyo===null)rSessBalAtOpen.current.tokyo=rBalance.current;
    if(inLondon&&rSessBalAtOpen.current.london===null)rSessBalAtOpen.current.london=rBalance.current;
    if(inNY&&rSessBalAtOpen.current.ny===null)rSessBalAtOpen.current.ny=rBalance.current;
    if(!inTokyo)rSessBalAtOpen.current.tokyo=null;
    if(!inLondon)rSessBalAtOpen.current.london=null;
    if(!inNY)rSessBalAtOpen.current.ny=null;
    const sessKey=inLondon?"london":inNY?"ny":inTokyo?"tokyo":null;
    const sessStart=sessKey?rSessBalAtOpen.current[sessKey]:null;
    const sessLossPct=sessStart?(sessStart-rBalance.current)/Math.max(sessStart,0.01):0;
    if(sessStart&&sessLossPct>=0.10){
      setPhase("STANDBY");
      setStatus(`🛑 Session cap: ${Math.round(sessLossPct*100)}% loss in ${(sessKey||"").toUpperCase()} · pausing until next session opens`);
      if(rMode.current!=="forward")setCandles([...newC]);
      return;
    }

    // ── UNIFIED SIGNAL EVALUATION ─────────────────────────────────
    // 30-strategy engine, 5-family diversity gate, market-state adaptive RR.
    const sig=masterSignal({
      cs:newC,hour,kL:rKLevels.current,spread,orb:rOrb.current,

      mktState:rMktState.current,
    });

    if(sig){
      setLastSignalVotes({buy:sig.buyVotes,sell:sig.sellVotes,dir:sig.dir,confirms:sig.confirms});
      setLastMTFBias(sig.mtfBias||0);
      setLastTradeMode("BALANCED");

      // ── CAPITAL ZONE CHECK ─────────────────────────────────────────
      const dayDD=(rDayStart.current-rBalance.current)/Math.max(rDayStart.current,0.01);
      if(dayDD>=DAILY_STOP_PCT){
        setPhase("STANDBY");
        setStatus(`🛑 Daily floor hit — balance $${rBalance.current.toFixed(2)} · protecting capital · resume tomorrow`);
        if(rMode.current!=="forward")setCandles([...newC]);
        return;
      }

      // ── ATR REGIME CHECK (HGE) ────────────────────────────────────
      const voteTotal=sig.buyVotes+sig.sellVotes||1;
      const voteMajority=(sig.dir==="BUY"?sig.buyVotes:sig.sellVotes)/voteTotal;
      const hge=hgeFilter({
        atrNow:atr, atrAvg:avgATR, voteStrength:voteMajority,
        mktState:rMktState.current, balance:rBalance.current,

      });
      if(!hge.allow){
        setPhase("SCANNING");
        if(rTickN.current%5===0)setStatus(`⏸ HGE: ${hge.regime==="dead"?"ATR dead — waiting for volatility":"weak consensus"} · scanning`);
        if(rMode.current!=="forward")setCandles([...newC]);
        return;
      }

      // ── HFT LOT SIZING — Exness Zero / 1:2000 / phase-based risk ─────
      // Recalculate SL with real current balance for accurate lot sizing
      const realSL=calcHFTSL({
        cs:newC, dir:sig.dir, entry:sig.entry, atr:sig.atr,
        spread, hourGMT:hour, balance:rBalance.current,
        inst:rInstrument.current,
      });
      const{lots:rawLots, riskDollars, riskPct, phase, hotStreak, inRecovery, hmrActive}=calcHFTLots({
        balance:rBalance.current,
        dayStartBal:rDayStart.current,
        startBalance:rStartBal.current,
        strength:sig.strength,
        score:sig.score,
        slD:realSL.slD,
        inst:rInstrument.current,
        streak:rStreak.current,
        livePrice:price,
        hourGMT:hour,
      });

      // Recovery mode: prefer higher-conviction signals but don't hard-block
      if(inRecovery && sig.score < rMinConf.current+1){
        setPhase("SCANNING");
        setStatus(`🔄 Recovery · waiting for ${rMinConf.current+1}+ votes (got ${sig.score}) · rebuilding`);
        if(rMode.current!=="forward")setCandles([...newC]);
        return;
      }

      // ── SESSION BOOST + ULTRA LOT SIZE + HGE MULT ─────────────────
      const sesBoost=getSessionBoost(hour);       // London/NY/Asia session multiplier
      const ultraMult=ultraLotMult(sig.score, rBalance.current); // high-conviction boost
      const hgeMult=hge.riskMult;                 // equity curve + regime multiplier
      // Composite multiplier: session × ultra × HGE, capped conservatively
      const compositeMult=Math.min(sesBoost*ultraMult*hgeMult, 3.0);

      // Only open 2 positions if strength is very high AND balance is healthy
      const numPos=(sig.strength>=85&&dayDD<0.03&&rBalance.current>15)?2:1;
      const lots=+Math.min(
        Math.max(+(rawLots*compositeMult/numPos).toFixed(4), MIN_LOT),
        MAX_LOT_NORMAL
      ).toFixed(4);

      // Use recalculated SL for the actual trade
      const finalSig={...sig, sl:realSL.sl, slD:realSL.slD,
        tp1:+(sig.dir==="BUY"?sig.entry+realSL.slD*1.5:sig.entry-realSL.slD*1.5).toFixed(2),
        tp2:+(sig.dir==="BUY"?sig.entry+realSL.slD*3.0:sig.entry-realSL.slD*3.0).toFixed(2),
        tp3:+(sig.dir==="BUY"?sig.entry+realSL.slD*6.0:sig.entry-realSL.slD*6.0).toFixed(2),
      };

      // Trade starts with structure-based SL. Trail activates when price reaches 50%
      // of entry→TP1 — at that point SL snaps to BE then follows using 40%-of-move formula.
      const t={...finalSig, sl:finalSig.sl, slD:finalSig.slD, lots, pnl:0,
        p1Done:false, p2Done:false, p3Done:false,
        trailing:false, beDone:false, posNum:1, inst:rInstrument.current,

      rTrade.current=t;
      rDayTrades.current+=numPos;setDayTrades(rDayTrades.current);setTrade(t);setPhase("IN_TRADE");

      const zoneLabel=dayDD>=CAUTION_PCT?"⚠CAUTION ":"";
      const posLabel=numPos>=2?"🔥×2 ":"🔥 ";
      const phaseLabel=`P${phase}`;
      const streakLabel=hotStreak?`🔥${rStreak.current.cur}W`:inRecovery?`⚠${rStreak.current.cur}L`:"";
      const hmrLabel=hmrActive?"🚧HMR ":"";
      const regimeLabel=hge.regime==="expansion"?"⚡EXP ":"";
      const sesLabel=sesBoost>1.2?"🔥LON/NY ":sesBoost<0.9?"🌙ASIA ":"";
      setStatus(`${posLabel}${zoneLabel}${hmrLabel}${regimeLabel}${sesLabel}⚡ ${sig.dir} @ ${sig.entry} · SL:${finalSig.sl} · TP1:${finalSig.tp1} · risk $${riskDollars.toFixed(2)} (${Math.round(riskPct*100)}%) · ×${compositeMult.toFixed(2)} · ${phaseLabel} ${streakLabel} · ${sig.strength}%`);

      if(numPos>=2){
        const t2={...finalSig, sl:finalSig.sl, slD:finalSig.slD, lots, pnl:0,
          p1Done:false, p2Done:false, p3Done:false,
          trailing:false, beDone:false, posNum:2, inst:rInstrument.current,
          highWater:finalSig.entry, lowWater:finalSig.entry,
          riskDollars, riskPct, openCandle:newC.length,
          tp1:+(sig.dir==="BUY"?sig.entry+realSL.slD*3.0:sig.entry-realSL.slD*3.0).toFixed(2),
          tp2:+(sig.dir==="BUY"?sig.entry+realSL.slD*5.5:sig.entry-realSL.slD*5.5).toFixed(2),
          tp3:+(sig.dir==="BUY"?sig.entry+realSL.slD*9.0:sig.entry-realSL.slD*9.0).toFixed(2),
        };
        rTrade2.current=t2;setTrade2(t2);
      }else{
        rTrade2.current=null;setTrade2(null);
      }
      return;
    }

    setPhase("SCANNING");
    if(rTickN.current===undefined)rTickN.current=0;
    rTickN.current++;
    if(rTickN.current%3===0){
      const h2=hour.toFixed(1);
      const inKZ=kzAt(hour);
      const reasons=[];
      const _spreadLimit=(SPREAD_LIMITS[rInstrument.current]??MAX_SPREAD);
      // Spread is no longer a hard blocker — show as info if wide
      if(spread>_spreadLimit&&spread<=_spreadLimit*3)reasons.push("wide spread "+spread.toFixed(2)+" (absorbed)");
      else if(spread>_spreadLimit*3)reasons.push("spread "+spread.toFixed(2)+" too wide (data err)");
      if(isNewsBlackout(rNews.current))reasons.push("news blackout");
      if(newC.length<5)reasons.push("building history ("+newC.length+"/5)");
      const atrNow=calcATR(newC);
      const atrFlatThresh=0.5;
      if(atrNow<atrFlatThresh)reasons.push("ATR flat "+atrNow.toFixed(2));
      // Reuse sig from above (already computed) — just check vote count for status
      if(sig){
        const got=Math.max(sig.buyVotes,sig.sellVotes);
        const need=rMinConf.current;
        if(got>=need){reasons.push("✓"+got+"/16 votes ("+sig.dir+") strength:"+sig.strength+"%");}
        else{reasons.push("need "+need+" confirms, got "+got+" ("+sig.dir+")");}
      }else{
        // sig was null above — run with minConf:1 just for the status hint, cheap path
        const nb=masterSignal({cs:newC,hour,kL:rKLevels.current,spread:0,orb:rOrb.current,
          news:rActiveNews.current,newsArr:rNews.current,fakeLog:rFakeLog.current,
          minConf:1,tfCandles:rTfCandles.current,inst:rInstrument.current});
        if(nb){reasons.push("need "+rMinConf.current+" confirms, got "+Math.max(nb.buyVotes,nb.sellVotes)+" ("+nb.dir+")");}
        else{reasons.push("no strategy votes · building pattern");}
      }
      const mStateLbl=rMktState.current==="TRENDING"?"📈TREND":rMktState.current==="RANGING"?"📊RANGE":"⚡LIVE";
      setStatus("⏳ Scanning"+
        (inKZ?" · "+inKZ.n:"")+" · "+h2+"h GMT · "+mStateLbl+
        (reasons.length?" · "+reasons[0]:""));
    }
    // ── CHART UPDATE: throttled for MT5-like backtest speed ──
    // In live/forward: chart reads rLiveCandles ref directly via RAF (zero overhead).
    // In backtest: only push to React every 10 candles — chart still draws via RAF.
    if(rMode.current!=="forward"){
      if(rTickN.current%10===0||rTrade.current)setCandles([...newC]);
    }
  }

  // ══════════════════════════════════════════════════════════════
  //  BACKTEST ENGINE — Real candle replay
  // ══════════════════════════════════════════════════════════════

  const RANGE_DAYS={
    "2weeks":14,"1month":30,"3months":90,"6months":180,
    "1year":365,"2years":730,"5years":1825
  };

  const loadBacktestData=useCallback(async()=>{
    setBtLoading(true);
    setBtStatus("📡 Connecting to Deriv (no API key needed)...");
    try{
      const days=RANGE_DAYS[btRange]||90;
      // fetchHistoricalData now tries Deriv first, automatically
      const data=await fetchHistoricalData(1,days,null,(msg)=>setBtStatus(msg),rInstrument.current);
      if(!data||data.length<50){
        setBtStatus("❌ Not enough candles returned. Check internet connection.");
        return;
      }
      // Filter to exact lookback window
      const cutoff=Date.now()-days*24*60*60*1000;
      const filtered=data.filter(c=>c.ts>=cutoff);
      const useData=filtered.length>50?filtered:data;// fallback: use all if filter too aggressive

      setBtCandles(useData);
      rBtIdx.current=50;setBtIdx(50);

      // Show first 50 candles on chart immediately so it's not blank before replay starts
      rCandles.current=useData.slice(0,50);
      setCandles(useData.slice(0,50));

      // Build all MTF candles from 1M data
      const tfc={
        m5:aggregateCandles(useData,5),
        m15:aggregateCandles(useData,15),
        h1:aggregateCandles(useData,60),
        h4:aggregateCandles(useData,240),
        d1:aggregateCandles(useData,1440),
      };
      setTfCandles(tfc);rTfCandles.current=tfc;
      // keepCandles=true so the 50 candles we just set aren't immediately wiped
      resetAllState(rStartBal.current,true);

      const from=fmtDateShort(useData[0]?.ts);
      const to=fmtDateShort(useData[useData.length-1]?.ts);
      setStatus(`✅ ${useData.length.toLocaleString()} candles loaded (${from} → ${to}) · Press ▶ Play to start`);
      setBtStatus(`✅ ${useData.length.toLocaleString()} candles · ${from} → ${to} · Ready`);
    }catch(e){
      setBtStatus(`❌ ${e.message}`);
      setStatus("❌ Data load failed — check internet connection");
    }finally{setBtLoading(false);}
  },[btRange]);

  // Get the MTF slice up to current replay position
  function getMTFSliceAt(m1Candles,idx){
    const slice=m1Candles.slice(0,idx+1);
    return{
      m5:aggregateCandles(slice,5).slice(-100),
      m15:aggregateCandles(slice,15).slice(-100),
      h1:aggregateCandles(slice,60).slice(-100),
      h4:aggregateCandles(slice,240).slice(-200),
      d1:aggregateCandles(slice,1440).slice(-500),
    };
  }

  // Replay step — process one 1M candle
  const replayStep=useCallback((candles1M)=>{
    const idx=rBtIdx.current;
    if(idx>=candles1M.length)return false;
    const candle=candles1M[idx];
    // Update MTF slices at this point in history
    const mtfSlice=getMTFSliceAt(candles1M,idx);
    rTfCandles.current=mtfSlice;
    // Realistic spread per instrument and session
    const hour=new Date(candle.ts).getUTCHours();
    const spread=kzAt(hour)?0.20:0.30; // XAUUSD session spread
    rSpread.current=spread;setLiveSpread(spread);
    processCandle(candle,spread);
    const newIdx=idx+1;
    rBtIdx.current=newIdx;setBtIdx(newIdx);

    // ── CHART THROTTLE — adaptive based on speed ──
    // TURBO (0ms): every 50 candles — keeps UI alive without choking
    // MAX   (10): every 10 candles
    // Fast  (50): every 2 candles
    // Normal(500): every candle (real pace)
    const spd=rReplaySpeed.current;
    const throttle=spd===0?50:spd<=10?10:spd<=50?2:1;
    if(newIdx%throttle===0){
      const visSlice=candles1M.slice(Math.max(0,newIdx-400),newIdx);
      setCandles([...visSlice]);
    }

    return newIdx<candles1M.length;
  },[]);

  // ── BACKTEST AUTO-PLAY LOOP ──────────────────────────────────
  // Speed tiers (rReplaySpeed):
  //   0   = TURBO   : 200 candles per rAF frame via MessageChannel micro-task
  //   10  = MAX     : 1 candle per MessageChannel tick (~100-200/sec)
  //   50  = Fast    : 1 candle per rAF frame (~60/sec)
  //   500 = Normal  : 1 candle per setTimeout delay (real pace)
  useEffect(()=>{
    if(mode!=="backtest"||!btRunning||btCandles.length===0)return;
    if(rReplayMode.current==="step")return;

    let cancelled=false;
    const mc=typeof MessageChannel!=="undefined"?new MessageChannel():null;

    const done=()=>{
      setBtRunning(false);
      setStatus("✅ Backtest complete · "+btCandles.length.toLocaleString()+" candles replayed");
    };

    const loop=()=>{
      if(cancelled||!rBtRunning.current||rBtIdx.current>=btCandles.length)return;
      const spd=rReplaySpeed.current;
      const isSignalMode=rReplayMode.current==="signal";

      if(spd===0&&!isSignalMode){
        // TURBO: batch 200 candles per rAF frame
        let n=0;
        while(n++<200&&rBtRunning.current&&rBtIdx.current<btCandles.length){
          if(!replayStep(btCandles)){done();return;}
        }
        requestAnimationFrame(loop);
      }else if(spd<=10||isSignalMode){
        // MAX / Signal: 1 candle per MessageChannel micro-task
        if(!replayStep(btCandles)){done();return;}
        if(isSignalMode&&rTrade.current){
          // Trade open in signal mode — slow down so user can see it
          setTimeout(loop,60);
        }else if(mc){
          mc.port1.onmessage=loop;
          mc.port2.postMessage(null);
        }else requestAnimationFrame(loop);
      }else if(spd<=50){
        // Fast: 1 candle per rAF frame (~60/sec)
        if(!replayStep(btCandles)){done();return;}
        requestAnimationFrame(loop);
      }else{
        // Normal: 1 candle per setTimeout (real pace)
        if(!replayStep(btCandles)){done();return;}
        setTimeout(loop,spd);
      }
    };

    requestAnimationFrame(loop);
    return()=>{cancelled=true;if(mc)mc.port1.onmessage=null;};
  },[btRunning,mode,btCandles,replayStep]);

  // ══════════════════════════════════════════════════════════════
  //  FORWARD TEST ENGINE — Live price → build real 1M candles
  // ══════════════════════════════════════════════════════════════

  const startForwardTest=useCallback(()=>{
    try{
    if(liveFeedRef.current){liveFeedRef.current.close();liveFeedRef.current=null;}
    resetAllState(rStartBal.current);
    rRunning.current=true;
    setMode("forward");setRunning(true);setSessionRunning(true);
    setStatus("Connecting live + loading history from Deriv...");
    setLiveStatus("📡 Connecting to Deriv...");

    // ── Phase 1: Load prev+today history from Deriv (3 days of 1M candles)
    // ── Phase 2: Connect Deriv live tick feed — ticks update the forming candle
    // Uses updateLiveCandle (pure, defined outside App) for safe state updates.
    let cancelled=false;
    const prefetch=async()=>{
      try{
        const instr2=INSTRUMENTS[rInstrument.current]||INSTRUMENTS.XAUUSD;
        setLiveStatus("📡 Loading 3 days of 1M candles from Deriv...");
        const data=await fetchDerivHistory(60,3,msg=>setLiveStatus(msg),instr2.derivSymbol);
        if(cancelled)return;

        const parsed=data.filter(c=>instr2.filterFn(c.open)&&c.high>0&&c.low>0);
        if(parsed.length>20){
          rLiveCandles.current=parsed.slice(-800);

          // Build MTF from loaded 1M data
          const tfc={
            m5:aggregateCandles(rLiveCandles.current,5).slice(-100),
            m15:aggregateCandles(rLiveCandles.current,15).slice(-100),
            h1:aggregateCandles(rLiveCandles.current,60).slice(-100),
            h4:aggregateCandles(rLiveCandles.current,240).slice(-200),
            d1:aggregateCandles(rLiveCandles.current,1440).slice(-500),
          };
          rTfCandles.current=tfc;setTfCandles(tfc);

          // Compute PDH/PDL: yesterday's candles only, Asian range from today
          const todayUTCDate=new Date().getUTCDate();
          const prevDayCandles=rLiveCandles.current.filter(c=>new Date(c.ts).getUTCDate()!==todayUTCDate);
          const todayCandles=rLiveCandles.current.filter(c=>new Date(c.ts).getUTCDate()===todayUTCDate);
          const pdSrc=prevDayCandles.length>5?prevDayCandles:rLiveCandles.current;
          const asianToday=todayCandles.filter(c=>{const h=new Date(c.ts).getUTCHours();return h>=0&&h<8;});
          rKLevels.current={
            pdh:+Math.max(...pdSrc.map(x=>x.high)).toFixed(2),
            pdl:+Math.min(...pdSrc.map(x=>x.low)).toFixed(2),
            asianH:asianToday.length?+Math.max(...asianToday.map(x=>x.high)).toFixed(2):null,
            asianL:asianToday.length?+Math.min(...asianToday.map(x=>x.low)).toFixed(2):null,
          };
          setKLevels({...rKLevels.current});

          // Seed rCandles so strategies have full context immediately
          rCandles.current=rLiveCandles.current.slice(-800);
          // Pre-seed ATR cache so tick handler has a valid value from the start
          rCachedATR.current=calcATR(rLiveCandles.current);
          setCandles([...rLiveCandles.current.slice(-800)]);// show full prev+today
          const closedBars=rLiveCandles.current.filter(c=>!c.forming).length;
          setLiveStatus(`✓ ${closedBars} real 1M bars loaded (Deriv prev+today) · Live feed connecting...`);
          setStatus(`✓ ${closedBars} candles from Deriv · Scanning for signal...`);

          // Immediate signal scan on loaded history
          const seedCandles=rLiveCandles.current;
          const hour0=seedCandles.length?new Date(seedCandles[seedCandles.length-1].ts).getUTCHours()+(new Date(seedCandles[seedCandles.length-1].ts).getUTCMinutes()/60):nowGMT();
          const spread0=rSpread.current||0.30;
          const mState0=detectMarketState(seedCandles);
          rMktState.current=mState0;setMktState(mState0);
          const sig0raw=masterSignal({cs:seedCandles,hour:hour0,kL:rKLevels.current,spread:spread0,
            orb:rOrb.current,news:rActiveNews.current,newsArr:rNews.current,fakeLog:rFakeLog.current,
            minConf:rMinConf.current,tfCandles:tfc,inst:rInstrument.current});
          let sig0=null;
          if(sig0raw&&sig0raw.strength>=40){sig0=sig0raw;}
          if(sig0&&rRunning.current&&!rTrade.current){
            setLastSignalVotes({buy:sig0.buyVotes,sell:sig0.sellVotes,dir:sig0.dir,confirms:sig0.confirms});
            setLastMTFBias(sig0.mtfBias||0);setLastTradeMode("BALANCED");
            const lotCap=sig0.strength>=90?MAX_LOT:MAX_LOT_NORMAL;
            const rawLots=getLotSize(rBalance.current,"BALANCED",sig0.slD);
            const numPos=(sig0.strength>=60&&rBalance.current>20)?2:1;
            const lots=+Math.min(Math.max(+(rawLots/numPos).toFixed(4),MIN_LOT),lotCap).toFixed(4);
            const t={...sig0,sl:sig0.sl,slD:sig0.slD,lots,pnl:0,p1Done:false,p2Done:false,p3Done:false,trailing:false,beDone:false,posNum:1,inst:rInstrument.current,
              highWater:sig0.entry,lowWater:sig0.entry,seteVotes:sig0.seteIds||[],seteRegime:sig0.seteRegime||"TRANSITION"};
            rTrade.current=t;
            rDayTrades.current+=numPos;setDayTrades(rDayTrades.current);setTrade(t);setPhase("IN_TRADE");
            const posLabel0=numPos>=2?"🔥×"+numPos+" ":"🔥 ";
            setStatus(posLabel0+"⚡ "+sig0.dir+" @ "+sig0.entry+" · "+sig0.confirms+" · "+sig0.strength+"%");
            if(numPos>=2){
              const t2={...sig0,lots,pnl:0,p1Done:false,p2Done:false,p3Done:false,trailing:false,beDone:false,posNum:2,
                highWater:sig0.entry,lowWater:sig0.entry,
                tp1:+(sig0.dir==="BUY"?sig0.entry+sig0.slD*2.2:sig0.entry-sig0.slD*2.2).toFixed(2),
                tp2:+(sig0.dir==="BUY"?sig0.entry+sig0.slD*4.0:sig0.entry-sig0.slD*4.0).toFixed(2),
                tp3:+(sig0.dir==="BUY"?sig0.entry+sig0.slD*7.0:sig0.entry-sig0.slD*7.0).toFixed(2),
              };
              rTrade2.current=t2;setTrade2(t2);
            }
          }else if(rRunning.current){
            setPhase("SCANNING");
            setStatus("⏳ No signal on loaded data · Scanning live ticks...");
          }
        }else{
          setLiveStatus("Building context from live ticks...");
          setStatus("⏳ Scanning — signal fires as soon as setup forms");
        }
      }catch(e){
        if(!cancelled){
          setLiveStatus(`⚠ History load failed: ${e.message} · Running on live ticks only`);
          setStatus("⏳ Scanning live ticks (no history)...");
        }
      }
      if(!cancelled)connectLiveFeed();
    };
    prefetch();
    return()=>{cancelled=true;};
    }catch(e){setStatus("❌ Start error: "+e.message);setRunning(false);}
  },[liveProvider]);

  const connectLiveFeed=useCallback(()=>{
    const onTick=(price,ask,bid,ts)=>{
      rLivePrice.current=price;
      const spread=ask&&bid?+(ask-bid).toFixed(2):0.30;
      rSpread.current=spread;
      // MT5-speed: update price on every tick — chart reads from refs via RAF at 60fps
      // React state for UI numbers updated every tick (price bar flickers at tick rate like MT5)
      rTickN.current=(rTickN.current||0)+1;
      setLivePrice(price);setLiveSpread(spread);
      if(rTickN.current%5===0){setLastFetchTs(Date.now());}

      // ── Build 1M candles using updateLiveCandle (pure helper) ──
      // History candles (forming:false) are preserved; updateLiveCandle appends the live bar.
      // Cold start with no history: seed a single forming candle so updateLiveCandle has context.
      if(rLiveCandles.current.length===0){
        const slot=Math.floor(ts/60000)*60000;
        rLiveCandles.current=[{ts:slot,open:price,high:price,low:price,close:price,
          vol:0,bull:true,body:0,range:0,forming:true}];
      }
      const prevLive=rLiveCandles.current;
      const nextLive=updateLiveCandle(prevLive,price,ts).slice(-800);

      // Detect candle close: only fires when a LIVE forming bar rolls into a new minute.
      // (history candles are forming:false — adding a new bar on top is NOT a close event)
      const prevLast=prevLive[prevLive.length-1];
      const nextLast=nextLive[nextLive.length-1];
      const candleClosed=prevLast&&prevLast.forming===true&&nextLast&&nextLast.ts!==prevLast.ts;

      rLiveCandles.current=nextLive;

      if(candleClosed){
        // Candle just closed — force chart to redraw immediately (MT5-like snap)
        // canvasRef not accessible here, but the RAF loop reads rLiveCandles ref directly
        // so the next frame will pick it up automatically. Just ensure _dirty is set.
        // The second-to-last entry is the newly closed live bar
        const closed=nextLive[nextLive.length-2];
        // Build MTF once from closed candles only (filter once, reuse)
        const closedOnly=nextLive.filter(c=>!c.forming);
        const tfc={
          m5:aggregateCandles(closedOnly,5).slice(-100),
          m15:aggregateCandles(closedOnly,15).slice(-100),
          h1:aggregateCandles(closedOnly,60).slice(-100),
          h4:aggregateCandles(closedOnly,240).slice(-200),
          d1:aggregateCandles(closedOnly,1440).slice(-500),
        };
        rTfCandles.current=tfc;setTfCandles(tfc);
        // Cache ATR so tick handler doesn't recompute it every tick
        rCachedATR.current=calcATR(nextLive);
        if(rCandles.current.length<10&&nextLive.length>10)rCandles.current=closedOnly.slice(-400);
        if(rRunning.current)processCandle(closed,spread);
        // Track live bar state for compatibility
        rLiveM1.current={ts:nextLast.ts,open:nextLast.open,high:nextLast.high,low:nextLast.low,close:price,vol:1};
      }else{
        // Keep rLiveM1 in sync with the current forming bar
        rLiveM1.current={ts:nextLast.ts,open:nextLast.open,
          high:nextLast.high,low:nextLast.low,close:price,vol:(rLiveM1.current.vol||0)+1};
      }
      // FIX 2: Check trail/SL exit on EVERY live tick — not just candle close.
      // Previously the bot only checked exits when a 1M candle closed (once per minute),
      // so intra-candle trail breaches (e.g. SELL with price going above trail) were missed.
      if(rRunning.current&&rTrade.current){
        // Use cached ATR (updated on each candle close) — avoids recomputing on every tick
        const atrNow=rCachedATR.current;
        rTrade.current=manageTrade(rTrade.current,price,atrNow,rLiveProvider.current,10);
        const tickExit=checkExit(rTrade.current,price);
        if(tickExit&&!tickExit.partial){
          const t=rTrade.current,pip=10;
          const pnl=t.dir==="BUY"?+((tickExit.exitPrice-t.entry)*pip*t.lots).toFixed(2):+((t.entry-tickExit.exitPrice)*pip*t.lots).toFixed(2);
          const won=pnl>0;
          rBalance.current=+(rBalance.current+pnl).toFixed(2);
          rPeakBal.current=Math.max(rPeakBal.current,rBalance.current);
          rStats.current={...rStats.current,w:rStats.current.w+(won?1:0),l:rStats.current.l+(won?0:1),
            pnl:+(rStats.current.pnl+pnl).toFixed(2),total:rStats.current.total+1};
          setStats({...rStats.current});setBalance(rBalance.current);setPeakBal(rPeakBal.current);
          // SETE v2: update strategy weights on tick-level full exit
          if(t.seteVotes&&t.seteVotes.length>0){
            updateSETEPerformance(t.seteVotes,won,t.seteRegime||"TRANSITION");
          }
          rTrade.current=null;setTrade(null);setPhase("SCANNING");
          const icon=tickExit.result==="TRAIL"?"🎯":won?"✅":"❌";
          // Show last result as a separate flash (auto-clears in 4s), status goes back to Scanning
          setLastResult({icon,text:`${tickExit.result} · ${t.dir} · ${won?"+":""}$${pnl.toFixed(2)}`,won});
          setTimeout(()=>setLastResult(null),4000);
          setStatus("⏳ Scanning — last: "+tickExit.result+" "+t.dir+" "+(won?"+":"")+"$"+pnl.toFixed(2));
          rLog.current=[{won,result:tickExit.result+"[tick]",dir:t.dir,strength:t.strength,
            confirms:t.confirms,entry:t.entry,exitP:tickExit.exitPrice.toFixed(2),
            pnl,time:new Date().toLocaleTimeString(),ts:Date.now()},...rLog.current].slice(0,500);
          setLog([...rLog.current]);
        }else if(tickExit&&tickExit.partial){
          const t=rTrade.current,pip=10,cl=+(t.lots*tickExit.pct).toFixed(4);
          const pnl=t.dir==="BUY"?+((tickExit.exitPrice-t.entry)*pip*cl).toFixed(2):+((t.entry-tickExit.exitPrice)*pip*cl).toFixed(2);
          const rawLockSL_t=tickExit.result==="TP1"?t.entry:tickExit.result==="TP2"?t.tp1:tickExit.result==="TP3🏆"?t.tp2:t.sl;
          const newSL=t.dir==="BUY"?Math.max(rawLockSL_t,t.sl):Math.min(rawLockSL_t,t.sl);
          rTrade.current={...t,lots:+(t.lots*(1-tickExit.pct)).toFixed(4),
            p1Done:tickExit.result==="TP1"?true:t.p1Done,
            p2Done:tickExit.result==="TP2"?true:t.p2Done,
            p3Done:tickExit.result==="TP3🏆"?true:t.p3Done,
            sl:newSL,beDone:true,
            highWater:t.highWater,lowWater:t.lowWater};
          rBalance.current=+(rBalance.current+pnl).toFixed(2);
          rStats.current={...rStats.current,pnl:+(rStats.current.pnl+pnl).toFixed(2)};
          setStats({...rStats.current});setBalance(rBalance.current);setTrade({...rTrade.current});

          // ── TP1 HIT: try to add a new position if signal agrees ──────
          // Only open trade2 once (when TP1 just hit), no existing trade2, and
          // at least 2 strategy votes agree in the same direction.
          if(tickExit.result==="TP1"&&!rTrade2.current){
            const cs2=rLiveCandles.current.slice(-100);
            const atr2=rCachedATR.current||calcATR(cs2);
            const spread2=rSpread.current||0.30;
            const hour2=new Date().getUTCHours()+(new Date().getUTCMinutes()/60);
            // Quick vote count — same direction as current trade
            const dir2=t.dir;
            const strategies2=[
              s_Impulse(cs2,atr2),s_Trend(cs2,atr2),s_FVG(cs2),
              s_Pattern(cs2),s_CHoCH(cs2,atr2),s_OB(cs2,atr2),
              s_Sweep(cs2,atr2),s_InsideBar(cs2,atr2),s_MomentumContinuation(cs2,atr2),
            ];
            const votes2=strategies2.filter(s=>s&&s.dir===dir2).length;
            if(votes2>=2){
              // Build fresh SL/TP from current price
              const entry2=+price.toFixed(2);
              const {sl:sl2,slD:slD2}=calcHFTSL({
                cs:cs2,dir:dir2,entry:entry2,atr:atr2,spread:spread2,
                hourGMT:hour2,balance:rBalance.current,inst:rInstrument.current});
              const tp1_2=+snapTP(dir2==="BUY"?entry2+slD2*1.5:entry2-slD2*1.5,dir2).toFixed(2);
              const tp2_2=+snapTP(dir2==="BUY"?entry2+slD2*3.0:entry2-slD2*3.0,dir2).toFixed(2);
              const tp3_2=+(dir2==="BUY"?entry2+slD2*6.0:entry2-slD2*6.0).toFixed(2);
              const rawLots2=getLotSize(rBalance.current,"BALANCED",slD2);
              const lots2=+Math.min(Math.max(rawLots2,MIN_LOT),MAX_LOT_NORMAL).toFixed(4);
              rTrade2.current={
                dir:dir2,entry:entry2,sl:sl2,tp1:tp1_2,tp2:tp2_2,tp3:tp3_2,
                slD:slD2,lots:lots2,strength:60,confirms:`TP1-ADD votes:${votes2}`,
                pnl:0,p1Done:false,p2Done:false,p3Done:false,
                beDone:false,trailing:false,
                highWater:null,lowWater:null,
                addedAt:"TP1",inst:rInstrument.current,
              };
              setTrade2({...rTrade2.current});
              setStatus(`+ TP1 ADD ${dir2} @ ${entry2} · ${votes2} votes confirm`);
            }
          }
        }else{
          setTrade({...rTrade.current});
        }
      }
      if(rRunning.current&&rTrade2.current){
        const atrNow2=rCachedATR.current;
        rTrade2.current=manageTrade(rTrade2.current,price,atrNow2,rLiveProvider.current,10);
        const tick2Exit=checkExit(rTrade2.current,price);
        if(tick2Exit&&!tick2Exit.partial){
          const t=rTrade2.current,pip=10;
          const pnl=t.dir==="BUY"?+((tick2Exit.exitPrice-t.entry)*pip*t.lots).toFixed(2):+((t.entry-tick2Exit.exitPrice)*pip*t.lots).toFixed(2);
          rBalance.current=+(rBalance.current+pnl).toFixed(2);
          rStats.current={...rStats.current,w:rStats.current.w+(pnl>0?1:0),l:rStats.current.l+(pnl>0?0:1),
            pnl:+(rStats.current.pnl+pnl).toFixed(2),total:rStats.current.total+1};
          setStats({...rStats.current});setBalance(rBalance.current);
          rTrade2.current=null;setTrade2(null);
        }else if(tick2Exit&&tick2Exit.partial){
          const t2c=rTrade2.current;
          const rawLock2=tick2Exit.result==="TP1"?t2c.entry:tick2Exit.result==="TP2"?t2c.tp1:tick2Exit.result==="TP3🏆"?t2c.tp2:t2c.sl;
          const newSL2=t2c.dir==="BUY"?Math.max(rawLock2,t2c.sl):Math.min(rawLock2,t2c.sl);
          rTrade2.current={...t2c,lots:+(t2c.lots*(1-tick2Exit.pct)).toFixed(4),
            p1Done:tick2Exit.result==="TP1"?true:t2c.p1Done,
            p2Done:tick2Exit.result==="TP2"?true:t2c.p2Done,
            p3Done:tick2Exit.result==="TP3🏆"?true:t2c.p3Done,
            sl:newSL2,beDone:true,
            highWater:t2c.highWater,lowWater:t2c.lowWater};
          setTrade2({...rTrade2.current});
        }else{
          setTrade2({...rTrade2.current});
        }
      }

      // ── TICK-LEVEL SIGNAL SCAN — fires when no trade open ─────────
      // Checks signal every 5 ticks so the bot doesn't wait a full minute
      // between candle closes. Uses rLiveCandles (closed+forming) for context.
      if(rRunning.current&&!rTrade.current&&rTickN.current%5===0&&rLiveCandles.current.length>=10){
        const cs_tick=rLiveCandles.current.slice(-200);
        const hour_tick=new Date().getUTCHours()+(new Date().getUTCMinutes()/60);
        const atr_tick=rCachedATR.current||calcATR(cs_tick);
        const spread_tick=rSpread.current||0.30;
        const mState_tick=rMktState.current||"NORMAL";
        const dayLoss_tick=(rBalance.current-rDayStart.current)<-(rDayStart.current*(rMaxLoss.current||10)/100);
        const timeSince_tick=rLastTradeTs.current===0?Infinity:Date.now()-rLastTradeTs.current;
        if(!dayLoss_tick&&!isNewsBlackout(rNews.current)&&timeSince_tick>300000||rLastTradeTs.current===0){
          const sig_tick=masterSignal({
            cs:cs_tick,hour:hour_tick,kL:rKLevels.current,spread:spread_tick,
            orb:rOrb.current,news:rActiveNews.current,newsArr:rNews.current,
            fakeLog:rFakeLog.current,minConf:rMinConf.current,
            tfCandles:rTfCandles.current,inst:rInstrument.current,mktState:mState_tick,
          });
          if(sig_tick&&sig_tick.strength>=40){
            const realSL_t=calcHFTSL({cs:cs_tick,dir:sig_tick.dir,entry:sig_tick.entry,
              atr:atr_tick,spread:spread_tick,hourGMT:hour_tick,
              balance:rBalance.current,inst:rInstrument.current});
            const{lots:rawL_t,riskDollars:rd_t,riskPct:rp_t}=calcHFTLots({
              balance:rBalance.current,dayStartBal:rDayStart.current,
              startBalance:rStartBal.current,strength:sig_tick.strength,
              score:sig_tick.score,slD:realSL_t.slD,inst:rInstrument.current,
              streak:rStreak.current,livePrice:price,hourGMT:hour_tick,
            });
            const lots_t=+Math.min(Math.max(rawL_t,MIN_LOT),MAX_LOT_NORMAL).toFixed(4);
            const t_tick={...sig_tick,
              sl:realSL_t.sl,slD:realSL_t.slD,
              tp1:+(sig_tick.dir==="BUY"?sig_tick.entry+realSL_t.slD*1.5:sig_tick.entry-realSL_t.slD*1.5).toFixed(2),
              tp2:+(sig_tick.dir==="BUY"?sig_tick.entry+realSL_t.slD*3.0:sig_tick.entry-realSL_t.slD*3.0).toFixed(2),
              tp3:+(sig_tick.dir==="BUY"?sig_tick.entry+realSL_t.slD*6.0:sig_tick.entry-realSL_t.slD*6.0).toFixed(2),
              lots:lots_t,pnl:0,p1Done:false,p2Done:false,p3Done:false,
              trailing:false,beDone:false,posNum:1,inst:rInstrument.current,
              highWater:sig_tick.entry,lowWater:sig_tick.entry,tradeMode:"TICK",
              seteVotes:sig_tick.seteIds||[],seteRegime:sig_tick.seteRegime||"TRANSITION"};
            rTrade.current=t_tick;
            rDayTrades.current+=1;setDayTrades(rDayTrades.current);
            setTrade(t_tick);setPhase("IN_TRADE");
            setStatus(`🔥 ${sig_tick.dir} @ ${sig_tick.entry} · ${sig_tick.confirms} · ${sig_tick.strength}%`);
            rLog.current=[{won:null,result:"OPEN",dir:sig_tick.dir,strength:sig_tick.strength,
              confirms:sig_tick.confirms,entry:sig_tick.entry,exitP:"—",pnl:0,
              time:new Date().toLocaleTimeString(),ts:Date.now()},...rLog.current].slice(0,500);
            setLog([...rLog.current]);
          }
        }
      }

      // MT5-speed: chart reads rLiveCandles ref via RAF — zero setCandles overhead here.
      // Non-critical UI refresh wrapped in startTransition (yields to chart RAF first).
      startTransition(()=>{ setLiveLastFetch(new Date().toLocaleTimeString()); });
    };

    const onStatus=s=>setLiveStatus(s);

    // Deriv-only live feed — public WebSocket, no API key required
    const instr=INSTRUMENTS[rInstrument.current]||INSTRUMENTS.XAUUSD;
    liveFeedRef.current=createDerivFeed(onTick,onStatus,instr.derivTickSymbol);
  },[liveProvider]);
  const stopForwardTest=useCallback(()=>{

  // Cleanup on unmount
  useEffect(()=>()=>{if(liveFeedRef.current)liveFeedRef.current.close();},[]);

  useEffect(()=>{rInstrument.current=instrument;_currentInst=instrument;},[instrument]);

  // ══════════════════════════════════════════════════════════════

  useEffect(()=>{

  // ── DERIVED VALUES ─────────────────────────────────────────────
  const price=livePrice??candles[candles.length-1]?.close??0;

  const TABS=[

    {id:"S1",name:"IMPULSE",desc:"Strong momentum candle ≥75% ATR with 42%+ body ratio."},

    {id:"S13",name:"DBL-TOP/BOT",desc:"Double Top / Double Bottom — M-top or W-bottom reversal at comparable price levels."},

      {/* API Keys Modal removed — Deriv needs no API key */}

        <div style={{display:"flex",alignItems:"center",gap:"7px"}}>
          <span style={{fontSize:"17px"}}>💰</span>

            <div style={{fontSize:"12px",fontWeight:"700",color:RED,letterSpacing:"0.06em",fontFamily:"'JetBrains Mono',monospace"}}>
              MONEY HEIST <span style={{fontSize:"8px",color:DIM}}>v10</span>
              <span style={{fontSize:"7px",color:PURPLE,marginLeft:"4px",padding:"1px 5px",background:PURPLE+"18",borderRadius:"3px",border:`1px solid ${PURPLE}30`}}>ULTRA-GOD</span>

        {!inBlackoutNow&&(()=>{const activeN=newsEvents.find(e=>e.impact!=="High"&&(()=>{const diff=(new Date(e.date)-new Date())/60000;return diff>=-2&&diff<=12;})());return activeN?<div style={{padding:"3px 9px",borderRadius:"20px",fontSize:"9px",background:GREEN+"15",border:`1px solid ${GREEN}40`,color:GREEN,animation:"blink 1.5s infinite"}}>📰 {activeN.impact} NEWS ✅</div>:null;})()}
        {mode==="forward"&&(

        <button className="btn" onClick={()=>{

        }} style={{padding:"6px 11px",borderRadius:"6px",border:`1px solid ${BORDER}`,background:"transparent",color:DIM,fontSize:"12px",cursor:"pointer"}}>↺</button>

      {trade?(
        <div style={{background:"#0b0d0b",borderBottom:`1px solid ${trade.dir==="BUY"?GREEN+"40":RED+"40"}`,

            <span style={{fontSize:"9px",color:TEXT,flexShrink:0}}>@{trade.entry.toFixed(2)}</span>
            <span style={{fontSize:"8px",color:DIM,flexShrink:0}}>SL:{trade.sl.toFixed(2)}</span>
            <span style={{fontSize:"8px",color:"#555",flexShrink:0}}>d:{(trade.slD??0).toFixed(2)}</span>
            {trade.trailing&&<span style={{fontSize:"8px",color:GOLD,fontWeight:"700",background:GOLD+"18",padding:"1px 5px",borderRadius:"3px",flexShrink:0}}>TRAIL</span>}
            {trade.beDone&&!trade.trailing&&<span style={{fontSize:"8px",color:BLUE,fontWeight:"700",background:BLUE+"18",padding:"1px 5px",borderRadius:"3px",flexShrink:0}}>BE</span>}
            {trade.p1Done&&<span style={{fontSize:"8px",color:GREEN,background:GREEN+"15",padding:"1px 4px",borderRadius:"3px",flexShrink:0}}>TP1✓</span>}
            {trade.p2Done&&<span style={{fontSize:"8px",color:"#66BB6A",background:GREEN+"12",padding:"1px 4px",borderRadius:"3px",flexShrink:0}}>TP2✓</span>}
            {trade.p3Done&&<span style={{fontSize:"8px",color:GOLD,background:GOLD+"15",padding:"1px 4px",borderRadius:"3px",flexShrink:0}}>TP3✓</span>}
            <span style={{marginLeft:"auto",fontSize:"14px",fontWeight:"800",flexShrink:0,
              color:trade.pnl>=0?GREEN:RED,letterSpacing:"0.3px"}}>
              {trade.pnl>=0?"+":""}${trade.pnl.toFixed(2)}
            </span>
          </div>

          {/* ── ROW 2: TP targets · Phase badge ── */}
          <div style={{display:"flex",alignItems:"center",gap:"6px",flexWrap:"wrap",marginBottom:"3px"}}>
            <span style={{fontSize:"8px",color:DIM,flexShrink:0}}>TPs:</span>
            <span style={{fontSize:"9px",color:"#4CAF50",fontWeight:"600",flexShrink:0}}>{trade.tp1.toFixed(2)}</span>
            <span style={{fontSize:"8px",color:DIM,flexShrink:0}}>›</span>

                    <div style={{fontSize:"8px",color:DIM}}>{won}W · {runHistory.length-won}L</div>
                  </div>
                  <div style={{textAlign:"center"}}>
                    <div style={{fontSize:"8px",color:DIM,marginBottom:"3px"}}>Total P&L</div>
                    <div style={{fontSize:"16px",fontWeight:"700",color:totalPnl>=0?GREEN:RED,fontFamily:"'JetBrains Mono',monospace"}}>{totalPnl>=0?"+":""}${totalPnl.toFixed(2)}</div>
                    {allLocked>0&&<div style={{fontSize:"8px",color:GOLD}}>🔒 ${allLocked.toFixed(2)} locked</div>}
                  </div>
                  <div style={{textAlign:"right"}}>
                    <div style={{fontSize:"8px",color:DIM,marginBottom:"3px"}}>All Trades</div>
                    <div style={{fontSize:"16px",fontWeight:"700",color:TEXT,fontFamily:"'JetBrains Mono',monospace"}}>{allTrades}</div>
                    <div style={{fontSize:"8px",color:DIM}}>{allTrades>0?Math.round(allWins/allTrades*100):0}% WR · {allTP3} TP3</div>
                  </div>
                </>);
              })()}
            </div>

            {runHistory.length===0?(
              <div style={{padding:"48px",textAlign:"center",color:DIM}}>
                <div style={{fontSize:"28px",marginBottom:"10px"}}>📋</div>
                <div style={{fontSize:"12px"}}>No runs yet</div>
                <div style={{fontSize:"9px",marginTop:"6px",color:DIM}}>Press ↺ to end a run and save it here</div>
              </div>
            ):runHistory.map((r,i)=>{
              const pnl=+(r.endBal-r.startBal+( r.locked||0)).toFixed(2);
              const rawPnl=+(r.endBal-r.startBal).toFixed(2);
              const won=rawPnl>=0;
              const wr2=r.trades>0?Math.round(r.wins/r.trades*100):0;
              const [expanded,setExpanded]=React.useState(false);
              return(
                <div key={i} style={{background:PANEL,borderRadius:"8px",
                  border:`1px solid ${won?GREEN+"30":RED+"30"}`,borderLeft:`3px solid ${won?GREEN:RED}`}}>
                  {/* Run header — tappable to expand */}
                  <div onClick={()=>setExpanded(e=>!e)} style={{padding:"12px 14px",cursor:"pointer"}}>
                    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:"6px"}}>
                      <div style={{display:"flex",gap:"8px",alignItems:"center"}}>
                        <span style={{fontSize:"12px",fontWeight:"700",color:TEXT}}>Run #{r.runNum}</span>
                        {r.ts&&<span style={{fontSize:"8px",color:DIM,fontFamily:"'JetBrains Mono',monospace"}}>{fmtDateShort(r.ts)}</span>}
                        {fmtDur(r.duration)&&r.duration>0&&<span style={{fontSize:"8px",color:DIM}}>{fmtDur(r.duration)}</span>}
                      </div>
                      <div style={{display:"flex",gap:"8px",alignItems:"center"}}>
                        <span style={{fontSize:"16px",fontWeight:"700",color:won?GREEN:RED,fontFamily:"'JetBrains Mono',monospace"}}>
                          {won?"+":""}${rawPnl.toFixed(2)}
                        </span>
                        <span style={{fontSize:"10px",color:DIM}}>{expanded?"▲":"▼"}</span>
                      </div>
                    </div>
                    <div style={{display:"flex",gap:"10px",flexWrap:"wrap",fontSize:"9px",color:DIM}}>
                      <span style={{fontFamily:"'JetBrains Mono',monospace"}}>${r.startBal?.toFixed(2)} → <span style={{color:won?GREEN:RED}}>${r.endBal?.toFixed(2)}</span></span>
                      <span>{r.trades||0} trades · <span style={{color:wr2>50?GREEN:wr2>35?GOLD:RED,fontWeight:"600"}}>{wr2}% WR</span></span>
                      {r.tp3>0&&<span style={{color:GOLD}}>🏆 {r.tp3} TP3</span>}
                      {r.locked>0&&<span style={{color:GOLD}}>🔒 +${r.locked?.toFixed(2)} locked</span>}
                    </div>
                  </div>
                  {/* Expanded: all trades in this run */}
                  {expanded&&r.log&&r.log.length>0&&(
                    <div style={{borderTop:`1px solid ${BORDER}`,padding:"10px 12px"}}>
                      <div style={{fontSize:"9px",color:DIM,marginBottom:"8px",textTransform:"uppercase"}}>
                        Trade Log · {r.log.length} entries
                      </div>
                      {r.log.map((e,j)=>(
                        <div key={j} style={{display:"flex",gap:"5px",alignItems:"center",padding:"5px 8px",marginBottom:"2px",
                          borderRadius:"5px",background:e.won?"#071207":"#120507",borderLeft:`2px solid ${e.won?GREEN:RED}`,
                          flexWrap:"wrap"}}>
                          <span style={{color:e.won?GREEN:RED,fontWeight:"700",fontSize:"9px",fontFamily:"'JetBrains Mono',monospace",flexShrink:0}}>
                            {e.result==="TP3🏆"?"🏆":e.result?.startsWith("TP")?"🎯":e.won?"✅":"❌"} {e.result}
                          </span>
                          <span style={{fontSize:"9px",color:e.dir==="BUY"?GREEN:RED,flexShrink:0,fontWeight:"600"}}>{e.dir}</span>
                          {e.strength!=null&&<span style={{fontSize:"7px",color:e.strength>=90?GOLD:DIM,padding:"1px 4px",background:"#1a1a1a",borderRadius:"3px",fontFamily:"'JetBrains Mono',monospace"}}>{e.strength}%</span>}
                          <span style={{fontSize:"7.5px",color:DIM,fontFamily:"'JetBrains Mono',monospace",flexShrink:0}}>{e.entry}→{e.exitP}</span>
                          {e.ts&&<span style={{fontSize:"7px",color:"#333",flexShrink:0}}>{fmtDateShort(e.ts)}</span>}
                          <span style={{flex:1}}/>
                          <span style={{fontFamily:"'JetBrains Mono',monospace",fontWeight:"700",fontSize:"10px",color:e.pnl>=0?GREEN:RED,flexShrink:0}}>{e.pnl>=0?"+":""}${(+e.pnl).toFixed(2)}</span>
                        </div>
                      ))}
                    </div>
                  )}
                  {expanded&&(!r.log||r.log.length===0)&&(
                    <div style={{borderTop:`1px solid ${BORDER}`,padding:"10px 12px",fontSize:"9px",color:DIM,textAlign:"center"}}>No trade log for this run</div>
                  )}
                </div>
              );
            })}
          </div>
        )}

        {/* ── SETTINGS TAB ── */}
        {tab==="settings"&&(
          <div style={{display:"flex",flexDirection:"column",gap:"10px"}}>

            {/* ── INSTRUMENT — XAU/USD only ── */}
            <div style={{background:PANEL,borderRadius:"8px",border:`1px solid ${GOLD}30`,padding:"14px"}}>
              <div style={{fontSize:"10px",color:DIM,marginBottom:"10px",textTransform:"uppercase",fontWeight:"600"}}>📊 Instrument</div>
              <div style={{display:"flex",alignItems:"center",gap:"12px",padding:"10px 12px",background:GOLD+"15",borderRadius:"7px",border:`1px solid ${GOLD}40`}}>
                <span style={{fontSize:"22px"}}>🥇</span>
                <div>
                  <div style={{fontSize:"14px",fontWeight:"700",color:GOLD}}>XAU/USD</div>
                  <div style={{fontSize:"9px",color:DIM,marginTop:"1px"}}>Gold · Live via Deriv · No API key</div>
                </div>
                <span style={{marginLeft:"auto",fontSize:"11px",color:GOLD}}>✓ Active</span>
              </div>
            </div>

            <div style={{background:PANEL,borderRadius:"8px",border:`1px solid ${GOLD}25`,padding:"14px"}}>
              <div style={{fontSize:"10px",color:GOLD,marginBottom:"12px",textTransform:"uppercase",fontWeight:"600"}}>💳 Account Balance</div>
              <div style={{display:"flex",justifyContent:"space-between",marginBottom:"10px"}}>
                <div><div style={{fontSize:"9px",color:DIM,marginBottom:"2px"}}>Start</div>
                  <div style={{fontSize:"18px",fontWeight:"700",color:BLUE,fontFamily:"'JetBrains Mono',monospace"}}>${startBal.toFixed(2)}</div></div>
                <div style={{textAlign:"right"}}><div style={{fontSize:"9px",color:DIM,marginBottom:"2px"}}>Current</div>
                  <div style={{fontSize:"18px",fontWeight:"700",color:balance>=startBal?GREEN:RED,fontFamily:"'JetBrains Mono',monospace"}}>${balance.toFixed(2)}</div></div>
              </div>
              <div style={{display:"flex",gap:"8px",marginBottom:"8px"}}>
                <input type="number" value={balInput} onChange={e=>setBalInput(e.target.value)}
                  onKeyDown={e=>e.key==="Enter"&&applyBalance()} placeholder="Set balance…"
                  style={{flex:1,background:"#0a0a0e",border:`1px solid ${BORDER}`,borderRadius:"6px",padding:"9px 12px",
                    color:TEXT,fontSize:"14px",fontFamily:"'JetBrains Mono',monospace",outline:"none"}}/>
                <button onClick={applyBalance} style={{padding:"9px 16px",borderRadius:"6px",background:GREEN+"22",border:`1px solid ${GREEN}`,color:GREEN,fontSize:"12px",fontWeight:"700",cursor:"pointer"}}>Apply</button>
              </div>
              <div style={{display:"flex",gap:"6px",flexWrap:"wrap",marginBottom:"6px"}}>
                {[10,50,100,200,500,1000].map(v=>(
                  <button key={v} onClick={()=>quickBal(v)} style={{padding:"5px 11px",borderRadius:"5px",background:"#0d0d0f",border:`1px solid ${BORDER}`,color:MUTED,fontSize:"10px",cursor:"pointer",fontFamily:"'JetBrains Mono',monospace"}}>${v}</button>
                ))}
              </div>
              {balFeedback&&<div style={{fontSize:"10px",color:balFeedback.startsWith("✅")?GREEN:RED,fontFamily:"'JetBrains Mono',monospace"}}>{balFeedback}</div>}
            </div>

            <div style={{background:PANEL,borderRadius:"8px",border:`1px solid ${GOLD}25`,padding:"14px"}}>
              <div style={{fontSize:"10px",color:GOLD,marginBottom:"12px",textTransform:"uppercase",fontWeight:"600"}}>🎯 Profit Target & Lock</div>
              <div style={{background:"#0d0d0f",borderRadius:"7px",padding:"10px 12px",marginBottom:"10px",border:`1px solid ${BORDER}`}}>
                <div style={{display:"flex",justifyContent:"space-between",marginBottom:"4px"}}>
                  <span style={{fontSize:"10px",color:DIM}}>Current target</span>
                  <span style={{fontSize:"14px",fontWeight:"700",color:GOLD,fontFamily:"'JetBrains Mono',monospace"}}>${profitTarget.toFixed(2)}</span>
                </div>
                <div style={{display:"flex",justifyContent:"space-between"}}>
                  <span style={{fontSize:"10px",color:DIM}}>Total locked (90%)</span>
                  <span style={{fontSize:"14px",fontWeight:"700",color:lockedProfits>0?GREEN:DIM,fontFamily:"'JetBrains Mono',monospace"}}>${lockedProfits.toFixed(2)}</span>
                </div>
              </div>
              <div style={{fontSize:"9px",color:DIM,marginBottom:"10px",padding:"5px 8px",background:"#0a0a0e",borderRadius:"5px",lineHeight:"1.7"}}>
                💡 Each target hit: <span style={{color:GREEN}}>10% released</span> to trading balance · <span style={{color:GOLD}}>90% locked</span> permanently
              </div>
              <div style={{display:"flex",gap:"6px",flexWrap:"wrap"}}>
                {[100,250,500,1000,2500,5000].map(v=>(
                  <button key={v} onClick={()=>{rProfitTarget.current=v;setProfitTarget(v);}}
                    style={{padding:"5px 11px",borderRadius:"5px",background:profitTarget===v?GOLD+"22":"#0d0d0f",
                      border:`1px solid ${profitTarget===v?GOLD:BORDER}`,color:profitTarget===v?GOLD:MUTED,
                      fontSize:"10px",cursor:"pointer",fontFamily:"'JetBrains Mono',monospace"}}>${v}</button>
                ))}
              </div>
            </div>

            <div style={{background:PANEL,borderRadius:"8px",border:`1px solid ${BORDER}`,padding:"14px"}}>
              <div style={{fontSize:"10px",color:DIM,marginBottom:"14px",textTransform:"uppercase"}}>Risk Controls</div>
              <div style={{marginBottom:"16px"}}>
                <div style={{display:"flex",justifyContent:"space-between",fontSize:"12px",marginBottom:"8px"}}>
                  <span style={{color:MUTED}}>Max daily loss</span>
                  <span style={{color:RED,fontWeight:"700",fontFamily:"'JetBrains Mono',monospace"}}>{maxLoss}%</span>
                </div>
                <input type="range" min="3" max="20" step="1" value={maxLoss} onChange={e=>setMaxLoss(+e.target.value)}/>
              </div>
              <div>
                <div style={{display:"flex",justifyContent:"space-between",fontSize:"12px",marginBottom:"8px"}}>
                  <span style={{color:MUTED}}>Min confirms</span>
                  <span style={{color:GOLD,fontWeight:"700",fontFamily:"'JetBrains Mono',monospace"}}>{minConf} / 16</span>
                </div>
                <input type="range" min="2" max="7" step="1" value={minConf} onChange={e=>setMinConf(+e.target.value)}/>
                <div style={{display:"flex",justifyContent:"space-between",fontSize:"9px",color:DIM,marginTop:"3px"}}>
                  <span>2 — aggressive</span><span>7 — ultra-selective</span>
                </div>
                <div style={{marginTop:"8px",padding:"6px 10px",background:"#0a0a0e",borderRadius:"5px",fontSize:"8px",color:DIM,lineHeight:"1.6"}}>
                  💡 Recommended: <span style={{color:GOLD}}>3–4</span> balanced · <span style={{color:PURPLE}}>5–6</span> sniper mode
                </div>
              </div>
            </div>

            <div style={{background:PANEL,borderRadius:"8px",border:`1px solid ${BORDER}`,padding:"14px"}}>
              <div style={{fontSize:"10px",color:DIM,marginBottom:"12px",textTransform:"uppercase"}}>📊 Session Summary</div>
              <div style={{display:"grid",gridTemplateColumns:"repeat(2,1fr)",gap:"8px"}}>
                {[
                  {l:"Trades",v:stats.total,c:TEXT},{l:"Win Rate",v:total>0?`${wr}%`:"—",c:wr>55?GREEN:wr>40?GOLD:DIM},
                  {l:"TP3 Hits 🏆",v:stats.tp3,c:GOLD},{l:"Total P&L",v:`${stats.pnl>=0?"+":""}$${stats.pnl.toFixed(2)}`,c:stats.pnl>=0?GREEN:RED},
                  {l:"Peak Bal",v:`$${peakBal.toFixed(2)}`,c:BLUE},{l:"Day Trades",v:dayTrades,c:MUTED},
                ].map(({l,v,c})=>(
                  <div key={l} style={{background:"#0d0d0f",padding:"9px 10px",borderRadius:"6px",border:`1px solid ${BORDER}`}}>
                    <div style={{fontSize:"8px",color:DIM,marginBottom:"2px",textTransform:"uppercase"}}>{l}</div>
                    <div style={{fontSize:"12px",fontWeight:"700",color:c,fontFamily:"'JetBrains Mono',monospace"}}>{v}</div>
                  </div>
                ))}
              </div>
            </div>

            <div style={{background:PANEL,borderRadius:"8px",border:`1px solid ${BORDER}`,padding:"14px"}}>
              <div style={{fontSize:"10px",color:DIM,marginBottom:"10px",textTransform:"uppercase"}}>
                📰 News Events · {newsEvents.length}
                {inBlackoutNow&&<span style={{color:RED,marginLeft:"8px",animation:"blink 1s infinite"}}>● HIGH-IMPACT BLACKOUT</span>}
                {!inBlackoutNow&&newsEvents.some(e=>e.impact!=="High"&&(()=>{const diff=(new Date(e.date)-new Date())/60000;return diff>=-2&&diff<=12;})())&&
                  <span style={{color:GREEN,marginLeft:"8px",animation:"blink 1.5s infinite"}}>● TRADING NEWS</span>}
              </div>
              {newsEvents.slice(0,8).map((e,i)=>{
                const isHigh=e.impact==="High";
                const isMed=e.impact==="Medium";
                const impactCol=isHigh?RED:isMed?GOLD:GREEN;
                const impactBg=isHigh?"#150508":isMed?"#0d0a00":"#080f08";
                return(
                <div key={i} style={{padding:"7px 10px",marginBottom:"3px",borderRadius:"5px",background:impactBg,border:`1px solid ${impactCol}28`}}>
                  <div style={{display:"flex",justifyContent:"space-between",marginBottom:"2px"}}>
                    <span style={{fontSize:"10px",color:TEXT,fontWeight:"500"}}>{e.title}</span>
                    <span style={{fontSize:"8px",color:impactCol,padding:"1px 5px",background:impactCol+"15",borderRadius:"3px",border:`1px solid ${impactCol}30`}}>
                      {e.impact}{isHigh?" 🚫":isMed?" ✅":" ✅"}
                    </span>
                  </div>
                  <div style={{fontSize:"8px",color:DIM,fontFamily:"'JetBrains Mono',monospace",display:"flex",gap:"8px",alignItems:"center"}}>
                    <span>{e.date?.slice(5,16)||"—"}</span>
                    {e.dir&&<span style={{color:e.dir==="BUY"?GREEN:RED,fontWeight:"700"}}>→{e.dir}</span>}
                    {!isHigh&&<span style={{color:impactCol,fontSize:"7px"}}>TRADE</span>}
                    {isHigh&&<span style={{color:RED,fontSize:"7px"}}>BLOCKED</span>}
                  </div>
                </div>
              );})}
              <div style={{marginTop:"6px",padding:"5px 8px",background:"#0d0d0f",borderRadius:"5px",fontSize:"8px",color:DIM,lineHeight:"1.6"}}>
                ✅ Low &amp; Medium impact = actively traded · 🚫 High impact = full blackout (-10min to +20min)
              </div>
            </div>

            <div style={{padding:"10px 12px",background:"#0d0d0f",borderRadius:"6px",fontSize:"9px",color:DIM,lineHeight:"1.7",border:`1px solid ${BORDER}`}}>
              ⚠ Simulation/backtesting only — not real trades. Backtest uses public free APIs. Forward test uses live price feeds. Not financial advice.
            </div>
          </div>
        )}

      </div>
      )}
      <InstallBanner/>
    </div>
  );
}

class ErrorBoundary extends React.Component {
  constructor(props){super(props);this.state={err:null};}
  static getDerivedStateFromError(e){return{err:e};}
  render(){
    if(this.state.err){
      return React.createElement('div',{style:{padding:'24px',color:'#f03858',fontFamily:'monospace',fontSize:'12px',background:'#0a0a0e',minHeight:'100vh'}},
        React.createElement('div',{style:{marginBottom:'8px',fontSize:'16px',fontWeight:'700'}},'⚠ App Error'),
        React.createElement('pre',{style:{whiteSpace:'pre-wrap',wordBreak:'break-all'}},String(this.state.err?.message||this.state.err))
      );
    }
    return this.props.children;
  }
}

ReactDOM.createRoot(document.getElementById("root")).render(
  React.createElement(ErrorBoundary,null,React.createElement(App))
);
// Hide boot after React has painted at least one frame
requestAnimationFrame(()=>requestAnimationFrame(()=>setTimeout(hideBoot,200)));
// Fallback: force-hide after 6s no matter what
setTimeout(hideBoot,6000);
</script>
</body>
</html>
